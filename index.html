<!DOCTYPE html>

<style>
/* =========================================

Do NOT rename IDs (#gameBox, #mazeTrack, etc.)
or you will break JavaScript connections.

/* =========================================
   2. CORE GAME CONTAINER (#gameBox) — SAFE TO STYLE
=========================================

This is the main gameplay panel.

Controls:
- size and layout of the game area
- background styling and effects
- visual feedback (glow, boss mode, hit effects)
- positioning of UI elements (autosave, etc.)

-----------------------------------------
SAFE TO EDIT:
- colors, shadows, glow effects
- padding, margins
- background / blur effects
- border styles
- animation intensity

-----------------------------------------
USE CAUTION:
- width / max-width / flex settings
- position: relative (needed for overlays like autosave)
- removing box-sizing may break layout

-----------------------------------------
DO NOT REMOVE:
- #gameBox selector (used throughout JS)
- .boss-mode class (boss visuals tied to logic)
- .hit class (damage feedback)

-----------------------------------------
TIP:
This controls how the game FEELS visually.
You can restyle it completely—just keep structure intact.

========================================= */
#gameBox {
    max-width: 750px;
    flex:1;
    min-width:0;
    width:100%;
    min-height: auto;
    margin: 0;
    padding: 18px 20px;
    text-align: center;
    background: linear-gradient(
        180deg,
        rgba(2,6,23,0.98),
        rgba(15,23,42,0.95)
    );
    backdrop-filter: blur(6px);
    border-radius: 14px;
    box-sizing: border-box;
    border: 1px solid rgba(56,189,248,0.15);
    box-shadow:
        0 0 25px rgba(56,189,248,0.25),
        0 0 70px rgba(37,99,235,0.18),
        inset 0 0 30px rgba(0,0,0,0.7);
    animation: torchFlicker 6s infinite;
    transition: box-shadow .3s ease;
    position: relative;
}

/* Boss state styling — triggered during boss fights (DO NOT REMOVE) */
#gameBox.boss-mode {
    border: 2px solid #38bdf8;
    box-shadow:
        0 0 35px rgba(56,189,248,0.6),
        0 0 80px rgba(37,99,235,0.35),
        inset 0 0 40px rgba(2,6,23,0.9);
}
   
.boss-icon{
    width: 28px;
    height: 28px;
    object-fit: contain;
    pointer-events: none;
}

/* Tier 1 — Tyrant */
.boss10 .boss-icon{filter:drop-shadow(0 0 5px rgba(125,211,252,0.8))drop-shadow(0 0 10px rgba(56,189,248,0.4));}

/* Tier 2 — Underwriter */
.boss20 .boss-icon{filter:drop-shadow(0 0 7px rgba(96,165,250,0.9))drop-shadow(0 0 14px rgba(37,99,235,0.6));}

/* Tier 3 — Strategist */
.boss30 .boss-icon{filter:drop-shadow(0 0 9px rgba(186,230,253,1))drop-shadow(0 0 20px rgba(56,189,248,0.9));}

/* Damage effect when boss/player is hit (visual feedback) */
.hit {box-shadow:0 0 50px rgba(239,68,68,0.9),inset 0 0 30px rgba(127,29,29,0.8) !important;animation: hitshake 0.4s ease;}

/* Autosave indicator — positioned relative to gameBox */
#autosave {position: absolute;top: 15px;right: 15px;font-size: 11px;opacity: 0.6;font-style: italic;color: rgba(125,211,252,0.7);}

/* Adds a graph box for questions with graphs */
#questionImageBox{
  margin: 0 auto 12px auto;
  text-align: center;
  display: none;
}

#questionImageBox img{
  max-width: 100%;
  width: 420px;
  height: auto;
  border-radius: 10px;
  box-shadow: 0 0 12px rgba(255,255,255,0.08);
}

/* =========================================
   3. TEXT & TYPOGRAPHY SYSTEM — SAFE TO CUSTOMIZE
=========================================
Controls all text styling in the game:
- question readability
- headers and titles
- boss emphasis text
- hints and feedback
- visual hierarchy
-----------------------------------------
SAFE TO EDIT:
- font sizes
- colors
- text shadows
- spacing (margin, line-height)
- stylistic effects (italic, uppercase, etc.)
-----------------------------------------
USE CAUTION:
- extreme font sizes (may break layout)
- removing margins (can cause overlap)
- removing contrast (hurts readability)
-----------------------------------------
DO NOT REMOVE:
- #question (core content display)
- .boss-title (boss transitions)
- .boss-q (boss summaries)
- .fade-out-text (feedback animation)
-----------------------------------------
TIP:
Prioritize readability over style.
If students can’t read it quickly, the system fails.
========================================= */
h2 { text-shadow: 0 0 10px rgba(255,255,255,0.3), 0 0 20px rgba(251,191,36,0.2); margin-bottom: 5px; }

/* Main question text — keep readable and centered */
#question { font-size: clamp(20px, 4vw, 22px); line-height: 1.4; font-weight: 600; margin: 14px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

/* Boss/summary title — high emphasis text */
.boss-title { font-size: 28px; font-weight: bold; margin-bottom: 15px; display: block;color: #fbbf24;text-shadow:0 0 10px rgba(251,191,36,0.6),0 0 25px rgba(249,115,22,0.4);}}

/* Area/zone label — subtle contextual info */
.area-title { color: #9ca3af; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 15px; }

/* Boss summary text — left-aligned for readability */
.boss-q {font-style: italic; font-size: 24px; border-left: 4px solid #f97316; padding-left: 15px; margin: 20px 0; text-align: left;}

/* Optional hint display (calculation or guidance) */
.hint-box { font-size: 13px; color: #fbbf24; margin-top: 15px; opacity: 0.8; height: 18px; }
    
/* Temporary feedback text (auto fades out) */
.fade-out-text { animation: fadeOut 5s forwards; font-weight: bold; color: #4ade80; }
   
/* Add styling to wizard text */
#message {margin-top: 10px; font-style: italic; letter-spacing: 0.5px; text-align: center; color: #cbd5f5; opacity: 0.85;}

/* Vault override */
.vault #message {color: #38bdf8; font-weight: 600; font-size: 16px; letter-spacing: 1px; font-style: italic; margin-top: 12px; text-shadow: 0 0 6px rgba(56,189,248,0.7), 0 0 14px rgba(14,165,233,0.5);}
   
/* =========================================
   4. BUTTONS & INTERACTION — SAFE TO CUSTOMIZE
=========================================
Controls all interactive elements:
- answer buttons
- hover/active feedback
- layout of answer choices
- utility buttons (fullscreen, etc.)
-----------------------------------------
SAFE TO EDIT:
- colors, backgrounds, borders
- hover/active effects (scale, glow, etc.)
- padding, spacing, font sizes
- button shapes (border-radius)
-----------------------------------------
USE CAUTION:
- removing hover/active effects (reduces feedback)
- extreme sizing (can break layout or overlap)
- flex settings in .answers (affects layout)
-----------------------------------------
DO NOT REMOVE:
- button selector (used globally)
- .answers layout (controls answer positioning)
-----------------------------------------
TIP:
Buttons should feel responsive and clickable.
Visual feedback = better engagement.
========================================= */
    
/* Base button styling — applies to all buttons */
button {padding: 12px 22px;margin: 6px;font-size: 16px;cursor: pointer; background: rgba(30,41,59,0.8); color: #e2e8f0; border: 1px solid rgba(148,163,184,0.25);
border-radius: 8px;box-shadow:0 0 8px rgba(59,130,246,0.15);transition: all 0.2s ease;}

/* Hover feedback — improves interactivity */
button:hover {background: rgba(59,130,246,0.12);border: 1px solid rgba(96,165,250,0.5);box-shadow: 0 0 18px rgba(96,165,250,0.4);transform: translateY(-2px);}

/* Click feedback — simulates button press */
button:active {transform: scale(0.96);box-shadow: 0 0 6px rgba(59,130,246,0.2),inset 0 0 10px rgba(0,0,0,0.6);}

/* Answer container — controls layout of choices */
.answers { display: flex; flex-direction: column; justify-content: center; gap: 12px; width: 100%}

/* Individual answer buttons — flexible sizing */
.answers button {flex: 1 1 100%;min-height: 60px; max-width: 100%; padding: 16px;font-size: 18px; margin: 0; background: rgba(15,23,42,0.85);border: 1px solid rgba(148,163,184,0.2);}

/* Utility button (fullscreen toggle) — safe to restyle or move */
.fullscreenBtn {position: absolute;top: 12px;left: 12px;background: rgba(15,23,42,0.9);color: #cbd5f5;border: 1px solid rgba(96,165,250,0.3);padding: 6px 12px;
    border-radius: 6px;font-size: 12px; box-shadow: 0 0 8px rgba(59,130,246,0.2);}

/* =========================================
   5. PROGRESS & MAZE TRACK — SAFE TO CUSTOMIZE (WITH RULES)
=========================================
Controls visual progression feedback:
- progress bar (top fill indicator)
- maze track (30-room grid)
- current position highlight
- boss room visual cues
-----------------------------------------
SAFE TO EDIT:
- colors, gradients, glow effects
- sizes (maze-box, spacing, gap)
- animation styles (pulse, transitions)
- grid sizing (with care)
-----------------------------------------
USE CAUTION:
- grid-template-columns (affects layout structure)
- maze-box size vs spacing (can cause overflow)
- removing animations (reduces feedback clarity)
-----------------------------------------
DO NOT MODIFY:
- #mazeTrack structure (10 columns × 3 rows = 30 rooms)
- nth-child(10, 20, 30) unless boss rooms are changed globally

Changing boss room visuals here requires matching updates in:
- game logic (boss triggers)
- progression system
-----------------------------------------
TIP:
This system gives players a sense of movement and progress.
If it's unclear, motivation drops.
========================================= */
    
/* Progress bar container — background track */
#progressBar { width: 100%; height: 22px; background: #2d3748; border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
    
/* Progress fill — width controlled by JS */    
#progressFill { height: 100%; width: 0%; background: linear-gradient(90deg, #f59e0b, #ef4444); transition: width 0.4s ease; }

/* Maze grid layout — 10 columns = 30 total rooms */
#mazeTrack { display: grid; grid-template-columns: repeat(10, 36px); justify-content: center; gap: 10px; margin: 25px auto; }

/* Individual room cell — default state */    
.maze-box { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 20px; border-radius: 6px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }

/* Current room highlight — animated pulse */
.maze-box.active { background: rgba(96,165,250,0.25); border: 2px solid #60a5fa; z-index: 10; animation: activePulse 0.8s infinite alternate;}
    
/* Boss room highlights (10, 20, 30) — visual only */
.maze-box:nth-child(10){text-shadow:0 0 6px rgba(125,211,252,0.8),0 0 12px rgba(56,189,248,0.4);}
.maze-box:nth-child(20){text-shadow:0 0 10px rgba(96,165,250,0.9),0 0 18px rgba(37,99,235,0.6);}
.maze-box:nth-child(30){text-shadow:0 0 12px rgba(186,230,253,1),0 0 22px rgba(56,189,248,0.9),0 0 40px rgba(14,165,233,0.6);}


/* Streak styling — Labyrinth */
.streak{display:inline-flex;align-items:center;gap:10px;font-weight:600;letter-spacing:0.5px;color: rgba(186,230,253,0.95);
    text-shadow:0 0 6px rgba(56,189,248,0.6);}

.streak-icon{width:22px;height:22px;object-fit:contain;border-radius:50%;
    filter:drop-shadow(0 0 5px rgba(125,211,252,0.9)) drop-shadow(0 0 10px rgba(56,189,248,0.7));
    background: radial-gradient(circle,rgba(186,230,253,0.6) 0%,rgba(56,189,248,0.35) 40%,rgba(2,6,23,0.0) 70%);
    animation: labyrinthPulse 2.6s ease-in-out infinite;}
   
/* =========================================
   6. ARTIFACT SYSTEM (REWARDS) — SAFE TO CUSTOMIZE
=========================================
Controls visual display of rewards:
- artifact drop popup (after boss wins)
- artifact vault (persistent collection)
- locked vs unlocked states
- reward animations and glow effects
-----------------------------------------
SAFE TO EDIT:
- colors, backgrounds, borders
- artifact sizes and spacing
- glow effects and animations
- text labels and styling
-----------------------------------------
USE CAUTION:
- opacity (controls locked vs unlocked visibility)
- transform/scale (can affect layout spacing)
- animation timing (too fast = distracting)
-----------------------------------------
DO NOT MODIFY:
- .artifactSlot.unlocked (linked to JS unlock logic)
- element IDs (#artifactDrop, #artifactVault, etc.)
- display behavior (used for showing/hiding rewards)

Changing these may break:
- artifact unlocking visuals
- vault persistence feedback
-----------------------------------------
TIP:
This is your reward system.
If it doesn’t feel rewarding, engagement drops.
========================================= */

/* Reward popup — appears after boss victory */
#artifactDrop { margin-top: 20px; padding: 14px; background: rgba(15,23,42,.6); border-radius: 10px; border: 1px solid rgba(99,102,241,.35); text-align: center; }
    
/* Artifact image in popup */
#artifactImage { width: 96px; margin-bottom: 8px; }
#artifactDrop img { filter: drop-shadow(0 0 12px rgba(56,189,248,.8)); }

/* Persistent artifact collection display (top panel) */
#artifactVault { margin-top: -6px; width: 220px; padding: 18px; border-radius: 12px; background: linear-gradient(180deg,#020617,#020617 60%,#020617 100%); box-shadow: 0 0 25px rgba(56,189,248,.15); border: 1px solid rgba(56,189,248,.25); text-align: center; display:block !important; }
#artifactVault h3 { color: #60a5fa; margin: 0 0 14px 0; text-shadow:0 0 8px rgba(96,165,250,0.4);}

/* Layout container for artifact slots */
.vaultRow { display: flex; justify-content: center; align-items:flex-end; gap: 15px; flex-wrap:wrap;}

/* Individual artifact slot (default = locked state) */    
.artifactSlot { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 70px; text-align:center; opacity: .25; transition: all .4s ease;}

/* Locked artifact image (grayscale effect) */    
.artifactSlot img { width: 45px; margin-bottom:4px;filter: grayscale(1); transition: all .4s ease; }

/* Unlocked artifact — triggered by JS (DO NOT REMOVE) */    
.artifactSlot span { display: block; font-size: 13px; color: #94a3b8; margin-top: 8px; line-height: 1.2; }

/* Glow + animation for unlocked artifacts */
.artifactSlot.unlocked { opacity: 1; transform: scale(1.05); }
.artifactSlot.unlocked img { filter: drop-shadow(0 0 14px rgba(56,189,248,.9)); animation: relicPulse 3s infinite; }
.artifactSlot.unlocked span { color: #e2e8f0; font-weight: 600; }
   
/* =========================================
   7. BOSS EFFECTS & ATMOSPHERE — SAFE TO CUSTOMIZE
=========================================
Controls visual intensity and immersion:
- boss animations (floating, shaking)
- boss-specific glow effects
- environmental effects (torches)
-----------------------------------------
SAFE TO EDIT:
- glow colors (match your theme)
- animation intensity and timing
- boss icon size
- torch placement and styling
-----------------------------------------
USE CAUTION:
- removing animations (reduces feedback and immersion)
- extreme sizing (can break layout)
- opacity/filter changes (affects visibility)
-----------------------------------------
DO NOT REMOVE:
- .boss-shake (triggered during boss hits)
- .bossIcon (used for boss rendering)
- .torch (environmental effect tied to game start)

Removing these will:
- eliminate combat feedback
- reduce visual clarity during bosses
-----------------------------------------
TIP:
This section controls how "intense" the game feels.
Subtle changes here dramatically affect experience.
========================================= */
    
/* Hit animation — triggered when boss takes damage */
.boss-shake {animation: bossShake 0.5s cubic-bezier(.36,.07,.19,.97) both;}
    
/* Boss image display — includes floating animation */
.bossIcon { width: 96px; height: auto; display: block; margin: 0 auto 12px auto; animation: bossFloat 4s ease-in-out infinite; }

/* Boss-specific glow effects (safe to recolor per theme, change name before glow to match your boss name) */
.tyrantGlow { filter: drop-shadow(0 0 14px rgba(96,165,250,.8)); }
.underwriterGlow { filter: drop-shadow(0 0 14px rgba(168,85,247,.8)); }
.finalBoss { filter: drop-shadow(0 0 18px rgba(239,68,68,.9)); }

/* Ambient torch effect — decorative, shown during gameplay */
.torch { position: absolute; width: 70px; top: 30px; z-index: 10; animation: torchFlicker 3s infinite alternate; pointer-events: none; opacity: .95; filter: drop-shadow(0 0 12px rgba(255,180,80,.7)); display:none; }

/* Torch positioning (left/right sides of screen) */    
.left-torch { left: 18px; }
.right-torch { right: 18px; transform: scaleX(-1); }

/* =========================================
   8. FULLSCREEN SCREENS & TRANSITIONS — SAFE TO CUSTOMIZE
=========================================
Controls full-screen UI layers:
- start screen (game entry)
- hallway transition overlay (between rooms)
- transition text display
-----------------------------------------
SAFE TO EDIT:
- background images (start screen, hallway scenes)
- text styling and layout
- overlay colors and opacity
- animation timing and effects
-----------------------------------------
USE CAUTION:
- position: fixed (required for full-screen coverage)
- z-index layering (controls what appears on top)
- opacity / pointer-events (controls visibility + interaction)
-----------------------------------------
DO NOT REMOVE:
- #startScreen (entry point to game)
- #hallwayTransition + .active (transition system)
- #hallwayText (text container)

Removing these will break:
- game start flow
- transition animations
- progression continuity
-----------------------------------------
TIP:
This section controls immersion and pacing between actions.
Good transitions = smoother experience.
========================================= */

/* Fullscreen start screen — shown before game begins */
#startScreen{position: fixed;inset: 0;
  background:
    linear-gradient(
      rgba(2,6,23,0.65),
      rgba(2,6,23,0.85)
    ),
    url('start screen image.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  z-index: 100;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 0px 20px;
  box-sizing: border-box;
}

/* Transition overlay — appears between rooms (controlled by JS) */
#hallwayTransition { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)), url('hallway1.png'); background-size: cover; background-position: center; display: flex; justify-content: center; align-items: center; text-align: center; color: white; font-size: 26px; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 1.2s ease; animation: hallwayZoom 3.2s ease-out forwards; }

/* Activates transition visibility (DO NOT REMOVE) */
#hallwayTransition.active { opacity: 1; }

/* Text container for transition messages */    
#hallwayText { max-width: 600px; background: rgba(0,0,0,0.55); padding: 30px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 0 25px rgba(0,0,0,0.6); }

/* =========================================
   9. ANIMATION SYSTEM — SAFE TO CUSTOMIZE (WITH CARE)
=========================================
Defines all animation keyframes used throughout the game:
- environmental effects (torch flicker)
- combat feedback (hit shake, boss shake)
- progression feedback (active pulse, victory glow)
- character motion (boss float, wizard float)
- reward effects (relic pulse)
- UI transitions (fade in/out)
-----------------------------------------
SAFE TO EDIT:
- animation intensity (scale, movement distance)
- timing (duration in CSS usage, not here)
- visual effects (glow, brightness, shadows)
-----------------------------------------
USE CAUTION:
- transform values (affects layout positioning)
- extreme motion (can feel distracting or chaotic)
- removing animations (reduces feedback clarity)
-----------------------------------------
DO NOT REMOVE:
- keyframe names (used across CSS and JS)
  e.g. torchFlicker, bossShake, activePulse, etc.

Renaming or deleting these will break:
- visual feedback
- boss effects
- UI transitions
-----------------------------------------
TIP:
Animations should reinforce feedback, not distract.
Subtle > excessive.
========================================= */

/* Ambient lighting effect (environmental immersion) */
@keyframes torchFlicker { 0%, 100% { filter: brightness(1); } 25% { filter: brightness(1.05); } 50% { filter: brightness(0.97); } 75% { filter: brightness(1.04); } }

/* Damage feedback (quick impact effect) */    
@keyframes hitshake { 0% { transform: translateX(0); } 25% { transform: translateX(-8px); } 50% { transform: translateX(8px); } 75% { transform: translateX(-6px); } 100% { transform: translateX(0); } }

/* Boss-specific hit feedback (stronger shake) */    
@keyframes bossShake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }

    let totalWeight = 0;

{id:33,q:"A person refuses a fair gamble with a 50% chance to win $100 and 50% chance to lose $100. This suggests the person is...",options:["Risk averse","Risk loving","Risk neutral","Indifferent to outcomes"],a:0,type:"interpretation",tag:"risk",feedback:"Rejecting a fair gamble indicates risk aversion due to diminishing marginal utility."},
{id:34,q:"An individual buys insurance even though they rarely file claims. This behavior suggests...",options:["They prefer certainty over risk","They are risk loving","They misunderstand probabilities","They expect frequent losses"],a:0,type:"interpretation",tag:"insurance",feedback:"Buying insurance reflects a preference for certainty and protection from risk."},
{id:35,q:"Two players both choose strategies that are best responses to each other. This situation describes...",options:["A Nash equilibrium","A dominant strategy","A random outcome","A cooperative agreement"],a:0,type:"interpretation",tag:"game_theory",feedback:"A Nash equilibrium occurs when each player is playing a best response to the other."},
{id:36,q:"A gamble gives $50 with 50% probability and $0 with 50% probability. What is the expected value?",options:["$25","$50","$0","$100"],a:0,type:"calculation",tag:"risk",feedback:"Expected value = (0.5×50) + (0.5×0) = $25."},
{id:37,q:"An insurance policy has a 10% chance of a $1,000 loss. What is the expected loss?",options:["$100","$1,000","$10","$900"],a:0,type:"calculation",tag:"insurance",feedback:"Expected loss = 0.10 × 1000 = $100."},
{id:38,q:"If both players in a Prisoner's Dilemma choose to betray, what outcome do they reach?",options:["Nash equilibrium","Pareto efficient outcome","Mixed strategy outcome","Dominant cooperation"],a:0,type:"calculation",tag:"game_theory",feedback:"Mutual betrayal is the Nash equilibrium because both are playing best responses."}

medium: [
{id:39, q:"Which statement best explains why expected utility differs from expected value?",options:["Utility may change nonlinearly with income","Expected value includes probabilities while utility does not","Utility always equals income","Expected utility ignores risk"],a:0,type:"definition",tag:"risk",feedback:"Expected utility accounts for preferences and diminishing marginal utility, while expected value is purely monetary."},
{id:40, q:"Moral hazard occurs when...",options:["Individuals take more risks after obtaining insurance","High-risk individuals are more likely to buy insurance","Insurance eliminates all uncertainty","Premiums exceed expected losses"],a:0,type:"definition",tag:"insurance",feedback:"Moral hazard arises because individuals change behavior after being insured."},
{id:41, q:"A dominant strategy is best described as...",options:["A strategy that is optimal regardless of what the other player does","A strategy that depends on beliefs about others","A random strategy","A cooperative agreement"],a:0,type:"definition",tag:"game_theory",feedback:"A dominant strategy yields the highest payoff no matter what the opponent chooses."},
{id:42, q:"A person buys partial insurance instead of full insurance even though full coverage is available. What does this suggest?",options:["They are trading off cost and risk","They are risk loving","They misunderstand insurance","They face no risk"],a:0,type:"interpretation",tag:"insurance",feedback:"Partial insurance reflects a tradeoff between the cost of premiums and the benefit of reducing risk."},
{id:43, q:"A firm chooses a strategy that is not its best response to a rival’s action. What does this imply?",options:["The outcome is not a Nash equilibrium","The firm has a dominant strategy","The firm is maximizing profit","The rival has no strategy"],a:0,type:"interpretation",tag:"game_theory",feedback:"In a Nash equilibrium, all players must be playing best responses."},
{id:44, q:"A risk-neutral individual faces a gamble with a 50% chance of $200 and 50% chance of $0. How will they value it?",options:["At $100, equal to its expected value","At $200, the highest payoff","At $0, the lowest payoff","They will reject it"],a:0,type:"interpretation",tag:"risk",feedback:"Risk-neutral individuals evaluate outcomes based solely on expected value."},
{id:45, q:"A gamble offers $100 with probability 0.3 and $0 otherwise. What is the expected value?",options:["$30","$70","$100","$0"],a:0,type:"calculation",tag:"risk",feedback:"Expected value = 0.3 × 100 = $30."},
{id:46, q:"An insurance policy covers a loss of $2,000 with a 5% probability. What is the expected loss?",options:["$100","$2,000","$50","$400"],a:0,type:"calculation",tag:"insurance",feedback:"Expected loss = 0.05 × 2000 = $100."},
{id:47, q:"In a payoff matrix, Player A’s best response to Player B’s action yields a payoff of 5, while an alternative yields 3. What should Player A choose?",options:["The strategy yielding 5","The strategy yielding 3","Randomize between both","Neither strategy"],a:0,type:"calculation",tag:"game_theory",feedback:"A best response is the strategy that gives the highest payoff given the opponent’s action."},
{id:48, q:"Expected utility theory predicts that individuals...",options:["Make choices based on utility rather than monetary value","Always choose the highest monetary payoff","Ignore probabilities","Prefer risky options"],a:0,type:"definition",tag:"risk",feedback:"Expected utility incorporates preferences and risk attitudes, not just monetary outcomes."},
{id:49, q:"Adverse selection occurs when...",options:["Higher-risk individuals are more likely to purchase insurance","Insured individuals take more risks","Firms misprice their products","Markets eliminate uncertainty"],a:0,type:"definition",tag:"insurance",feedback:"Adverse selection arises from asymmetric information before a transaction occurs."},
{id:50, q:"A Nash equilibrium occurs when...",options:["Each player’s strategy is a best response to the other’s","All players cooperate","Payoffs are maximized for all players","Strategies are randomized"],a:0,type:"definition",tag:"game_theory",feedback:"In Nash equilibrium, no player has an incentive to deviate unilaterally."},
{id:51, q:"A person refuses insurance when premiums are very high relative to expected loss. What does this suggest?",options:["They are weighing cost against risk reduction","They are risk loving","They misunderstand probabilities","They face no uncertainty"],a:0,type:"interpretation",tag:"insurance",feedback:"Even risk-averse individuals may reject insurance if the cost exceeds the benefit."},
{id:52, q:"Two firms repeatedly compete and begin cooperating over time. What likely explains this shift?",options:["Future interactions make cooperation more valuable","They became risk neutral","The payoff matrix disappeared","Competition no longer exists"],a:0,type:"interpretation",tag:"game_theory",feedback:"Repeated interaction allows for punishment strategies that sustain cooperation."},
{id:53, q:"An individual prefers a gamble with the same expected value but higher risk. This suggests...",options:["They are risk loving","They are risk averse","They are risk neutral","They ignore utility"],a:0,type:"interpretation",tag:"risk",feedback:"Risk-loving individuals prefer higher variance outcomes."},
{id:54, q:"A gamble pays $200 with probability 0.25 and $0 otherwise. What is the expected value?",options:["$50","$200","$25","$0"],a:0,type:"calculation",tag:"risk",feedback:"Expected value = 0.25 × 200 = $50."},
{id:55, q:"An insurance loss is $500 with a 20% probability. What is the expected loss?",options:["$100","$500","$20","$400"],a:0,type:"calculation",tag:"insurance",feedback:"Expected loss = 0.20 × 500 = $100."},
{id:56, q:"If a player has two strategies yielding payoffs of 8 and 5 given the opponent’s choice, what is the best response?",options:["Choose the strategy yielding 8","Choose the strategy yielding 5","Randomize between both","Avoid both strategies"],a:0,type:"calculation",tag:"game_theory",feedback:"A best response maximizes payoff given the opponent’s action."},
{id:57, q:"A risk-averse individual rejects a fair gamble with expected value equal to a certain outcome. What explains this choice?",options:["Diminishing marginal utility of income","Incorrect probability assessment","Higher expected value of certainty","Risk neutrality"],a:0,type:"interpretation",tag:"risk",feedback:"Risk-averse individuals prefer certainty because utility increases at a decreasing rate."},
{id:58, q:"An insurance company offers policies priced exactly at expected loss, yet many individuals still decline coverage. Why?",options:["They are not sufficiently risk averse","They misunderstand probabilities","The insurer is unprofitable","Insurance eliminates all risk"],a:0,type:"interpretation",tag:"insurance",feedback:"If individuals are not very risk averse, they may not value the reduction in risk enough to buy insurance."},
{id:59, q:"In a game, both players have dominant strategies that lead to a worse outcome than cooperation. What does this illustrate?",options:["The Prisoner’s Dilemma","A coordination failure","A Pareto improvement","A mixed strategy equilibrium"],a:0,type:"interpretation",tag:"game_theory",feedback:"The Prisoner’s Dilemma shows how individually rational choices can lead to worse collective outcomes."},
{id:60, q:"A gamble pays $150 with probability 0.6 and $0 otherwise. What is the expected value?",options:["$90","$150","$60","$75"],a:0,type:"calculation",tag:"risk",feedback:"Expected value = 0.6 × 150 = $90."},
{id:61, q:"An insurance loss of $1,000 occurs with probability 0.1. What premium would make the insurer break even?",options:["$100","$1,000","$10","$500"],a:0,type:"calculation",tag:"insurance",feedback:"Break-even premium equals expected loss: 0.1 × 1000 = $100."},
{id:62, q:"A player chooses a strategy that maximizes payoff given the opponent’s move. What concept does this describe?",options:["Best response","Dominant strategy","Mixed strategy","Focal point"],a:0,type:"definition",tag:"game_theory",feedback:"A best response is the payoff-maximizing strategy given the opponent’s action."},
{id:63, q:"A risk-neutral individual is indifferent between a gamble and a certain amount equal to its expected value. Why?",options:["Utility is linear in income","Utility is concave","Utility is convex","Probabilities are ignored"],a:0,type:"interpretation",tag:"risk",feedback:"Risk-neutral individuals have linear utility, so expected value equals expected utility."},
{id:64, q:"An insurer raises deductibles to reduce risky behavior by policyholders. What problem are they addressing?",options:["Moral hazard","Adverse selection","Risk neutrality","Strategic commitment"],a:0,type:"interpretation",tag:"insurance",feedback:"Deductibles ensure individuals bear some cost, reducing incentives to take excessive risks."},
{id:65, q:"In a coordination game, multiple equilibria exist but players fail to coordinate. What is missing?",options:["A focal point","A dominant strategy","A mixed strategy","A payoff matrix"],a:0,type:"interpretation",tag:"game_theory",feedback:"Focal points help players align expectations when multiple equilibria exist."},
{id:66, q:"A gamble pays $80 with probability 0.5 and $40 with probability 0.5. What is the expected value?",options:["$60","$80","$40","$20"],a:0,type:"calculation",tag:"risk",feedback:"Expected value = (0.5×80) + (0.5×40) = $60."},
{id:67, q:"An insurance policy covers losses of $500 with probability 0.2. What is the expected loss?",options:["$100","$500","$50","$200"],a:0,type:"calculation",tag:"insurance",feedback:"Expected loss = 0.2 × 500 = $100."},
{id:68, q:"A firm deviates from a collusive agreement in a one-shot game. Why is this outcome expected?",options:["There is no future punishment to deter deviation","Firms are risk loving","Payoffs are equal","Strategies are random"],a:0,type:"interpretation",tag:"game_theory",feedback:"Without future interaction, firms have no incentive to sustain cooperation."},
{id:69, q:"A risk-loving individual prefers a gamble with higher variance but equal expected value. What does this imply about their utility function?",options:["It is convex","It is concave","It is linear","It is constant"],a:0,type:"interpretation",tag:"risk",feedback:"Risk-loving individuals have convex utility, valuing variability positively."},
{id:70, q:"An insurer cannot perfectly distinguish risk types but still offers a single premium. What type of equilibrium is this?",options:["Pooling equilibrium","Separating equilibrium","Dominant equilibrium","Mixed equilibrium"],a:0,type:"definition",tag:"insurance",feedback:"A pooling equilibrium occurs when all types are offered the same contract."},
{id:71, q:"In a payoff matrix, no player can improve their payoff by changing strategy unilaterally. What condition is satisfied?",options:["Nash equilibrium","Dominant strategy equilibrium","Pareto efficiency","Mixed strategy equilibrium"],a:0,type:"definition",tag:"game_theory",feedback:"This is the defining condition of a Nash equilibrium."},
{id:72, q:"A gamble has an expected value of $100, but a risk-averse individual prefers $90 for certain. Why?",options:["The expected utility of the gamble is lower than the utility of $90","The expected value is incorrect","The gamble has lower variance","The individual is risk neutral"],a:0,type:"interpretation",tag:"risk",feedback:"Risk-averse individuals evaluate utility, not expected value. A lower certain amount can yield higher utility."},
{id:73, q:"An individual buys insurance even though the premium is higher than expected loss. Which incorrect reasoning might explain a student’s confusion?",options:["They think expected value alone determines choices","They misunderstand utility","They believe insurance removes all risk","They assume probabilities are incorrect"],a:0,type:"interpretation",tag:"insurance",feedback:"Students often incorrectly focus only on expected value, ignoring utility and risk aversion."},
{id:74, q:"Two firms in a Prisoner’s Dilemma both defect even though cooperation yields higher profits. Why don’t they cooperate?",options:["Defection is each firm’s best response regardless of the other’s choice","They cannot calculate profits","Cooperation is illegal","There is no equilibrium"],a:0,type:"interpretation",tag:"game_theory",feedback:"Students often think cooperation should occur, but dominant strategies lead to defection."},
{id:75, q:"A gamble pays $100 with probability 0.5 and $0 otherwise. A student claims the expected value is $100. What mistake are they making?",options:["They are ignoring probabilities","They are confusing utility with value","They are assuming risk aversion","They are averaging incorrectly"],a:0,type:"calculation",tag:"risk",feedback:"Expected value must weight outcomes by probability: 0.5×100 = 50."},
{id:76, q:"An insured driver becomes less careful after buying insurance. A student calls this adverse selection. What is the correct concept?",options:["Moral hazard","Adverse selection","Risk neutrality","Strategic behavior"],a:0,type:"interpretation",tag:"insurance",feedback:"Students often confuse adverse selection (before contract) with moral hazard (after contract)."},
{id:77, q:"A firm threatens to lower prices if a rival enters, but doing so would hurt its own profits. Why might a student incorrectly think this threat works?",options:["They assume all threats are credible","They misunderstand payoffs","They think Nash equilibrium requires threats","They ignore strategic interaction"],a:0,type:"interpretation",tag:"game_theory",feedback:"Students often fail to distinguish between credible and non-credible threats."},
{id:78, q:"A risk-neutral individual rejects a gamble with expected value equal to a certain outcome. What misconception might a student have?",options:["They think risk-neutral individuals dislike risk","They confuse utility with value","They misunderstand probabilities","They assume variance matters"],a:0,type:"interpretation",tag:"risk",feedback:"Risk-neutral individuals care only about expected value, not risk."},
{id:79, q:"An insurance company raises premiums when mostly high-risk individuals enroll. A student calls this moral hazard. What is the correct explanation?",options:["Adverse selection","Moral hazard","Risk aversion","Strategic commitment"],a:0,type:"interpretation",tag:"insurance",feedback:"Students often confuse adverse selection (who buys insurance) with moral hazard (behavior after purchase)."},
{id:80, q:"In a coordination game, players fail to reach the best outcome. A student claims there is no equilibrium. What is the correct interpretation?",options:["Multiple equilibria exist but players failed to coordinate","No equilibrium exists","Players are irrational","Payoffs are equal"],a:0,type:"interpretation",tag:"game_theory",feedback:"Students often mistake coordination failure for absence of equilibrium."},
{id:81, q:"A gamble has outcomes $50 and $150 with equal probability. A student says the expected value is $150. What error are they making?",options:["They are ignoring one outcome","They are confusing expected value with maximum payoff","They are misreading probabilities","They are assuming risk aversion"],a:0,type:"calculation",tag:"risk",feedback:"Expected value averages outcomes: (50+150)/2 = 100."},
{id:82, q:"A deductible reduces insurance payouts for small losses. A student claims this increases adverse selection. What is the correct effect?",options:["It reduces moral hazard","It increases adverse selection","It eliminates risk","It increases premiums"],a:0,type:"interpretation",tag:"insurance",feedback:"Deductibles reduce risky behavior, addressing moral hazard, not adverse selection."},
{id:83, q:"A firm chooses a strategy that is not a best response. A student claims this is still equilibrium. Why is this incorrect?",options:["Equilibrium requires mutual best responses","Equilibrium requires cooperation","Equilibrium requires dominant strategies","Equilibrium requires randomness"],a:0,type:"interpretation",tag:"game_theory",feedback:"Students often misunderstand that Nash equilibrium requires best responses from all players."},
{id:84, q:"A gamble has expected value $0, but a student says it should always be rejected. What misconception is this?",options:["They ignore risk preferences","They assume zero value means negative utility","They misunderstand probabilities","They assume risk neutrality"],a:0,type:"interpretation",tag:"risk",feedback:"Zero expected value does not imply rejection—preferences depend on risk attitudes."},
{id:85, q:"An insurer cannot distinguish between risk types and sets one premium. A student says this is inefficient because firms are irrational. What is the correct explanation?",options:["Information asymmetry leads to pooling","Firms are irrational","Markets fail completely","Risk disappears"],a:0,type:"interpretation",tag:"insurance",feedback:"Students often attribute outcomes to irrationality rather than asymmetric information."},
{id:86, q:"A player randomizes strategies in equilibrium. A student says this is because the player is uncertain. What is the correct reason?",options:["To make the opponent indifferent between strategies","Because payoffs are unknown","Because strategies are random","Because equilibrium requires it"],a:0,type:"interpretation",tag:"game_theory",feedback:"Randomization is strategic—it prevents opponents from exploiting predictable behavior."}

hard:[

{id:101,q:"Two firms are in a Prisoner’s Dilemma. They both prefer cooperation but end up defecting. What is the core reason this outcome persists?",options:["Each firm’s best response is to defect regardless of the other’s action","Firms cannot calculate payoffs","Cooperation yields lower profits","The game lacks a Nash equilibrium"],a:0,tag:"game_theory",type:"interpretation",feedback:"Defection is the dominant strategy, making it the Nash equilibrium even though cooperation would be better collectively."},
{id:102,q:"In a sequential game, a firm threatens to cut prices if a rival enters the market, but doing so would reduce its own profits. Why is this threat not credible?",options:["It is not part of a subgame perfect equilibrium","It is not a dominant strategy","It does not change the payoff matrix","It violates Nash equilibrium"],a:0,tag:"game_theory",type:"interpretation",feedback:"Subgame perfect equilibrium requires that strategies be optimal at every decision point. A threat that harms the firm is not credible."},
{id:103,q:"An insurance company raises premiums after observing that only high-risk individuals are purchasing policies. What problem is the firm facing?",options:["Adverse selection","Moral hazard","Diminishing marginal utility","Strategic commitment"],a:0,tag:"insurance",type:"definition",feedback:"Adverse selection occurs when higher-risk individuals are more likely to purchase insurance, driving up costs."},
{id:104,q:"In a repeated Prisoner’s Dilemma, cooperation is sustained using a trigger strategy. What is the key mechanism that makes this possible?",options:["The threat of future punishment outweighs short-term gains from cheating","Players become risk neutral over time","The payoff matrix changes each round","Communication becomes enforceable"],a:0,tag:"game_theory",type:"interpretation",feedback:"If future interaction is likely, the long-term cost of punishment can deter short-term defection."},
{id:105,q:"A consumer buys full insurance even when the premium exceeds the expected loss. What does this behavior imply?",options:["Strong risk aversion and a preference for certainty","The consumer is risk neutral","The insurer is losing money","The expected value is negative"],a:0,tag:"insurance",type:"interpretation",feedback:"Risk-averse individuals may pay more than expected loss to eliminate uncertainty because they value certainty in utility terms."},
{id:106,q:"In a coordination game with multiple equilibria, players fail to coordinate on the best outcome. What concept can help them align expectations?",options:["Focal point","Dominant strategy","Mixed strategy","Moral hazard"],a:0,tag:"game_theory",type:"definition",feedback:"Focal points help players coordinate on a likely outcome using shared expectations or context outside the game."},
{id:107,q:"A mixed strategy equilibrium requires players to randomize their actions. What is the purpose of this randomization?",options:["To make opponents indifferent between their available strategies","To maximize total welfare","To eliminate all risk","To guarantee higher payoffs"],a:0,tag:"game_theory",type:"interpretation",feedback:"Players randomize to keep opponents indifferent, preventing them from exploiting predictable behavior."},
{id:108,q:"An insurer cannot distinguish between high-risk and low-risk individuals, leading to higher average premiums. What is the likely outcome?",options:["Low-risk individuals exit the market","All individuals buy more insurance","Risk disappears","Premiums fall"],a:0,tag:"insurance",type:"interpretation",feedback:"Adverse selection drives low-risk individuals out, leaving a riskier pool and higher premiums."},

{id:110,q:"In a sequential entry game, an incumbent builds excess capacity to deter entry. Why might this be effective?",options:["It makes the threat to flood the market more credible","It increases production costs for both firms","It eliminates demand uncertainty","It guarantees monopoly profits"],a:0,tag:"game_theory",type:"interpretation",feedback:"Excess capacity can signal a credible threat to expand output and lower prices if entry occurs."},
{id:111,q:"A gamble has zero expected value, but a risk-loving individual accepts it. What explains this decision?",options:["The utility of the gamble exceeds the utility of the certain outcome","The probabilities are incorrect","The gamble has no variance","The individual is risk neutral"],a:0,tag:"risk",type:"interpretation",feedback:"Risk-loving individuals prefer higher variance and may gain higher expected utility from the gamble."},
{id:112,q:"In a repeated game with a known final period, why does cooperation typically break down?",options:["Backward induction leads players to defect in every period","Players forget past actions","Payoffs become identical","Communication becomes impossible"],a:0,tag:"game_theory",type:"interpretation",feedback:"In a finite game, players anticipate defection in the final period, unraveling cooperation backward."},
{id:113,q:"Two players each choose strategies that are best responses to one another. What does this guarantee?",options:["A Nash equilibrium","A dominant strategy equilibrium","A Pareto efficient outcome","A mixed strategy outcome"],a:0,tag:"game_theory",type:"definition",feedback:"A Nash equilibrium occurs when each player’s strategy is a best response to the other’s."},
{id:114,q:"A policy eliminates all risk for individuals but reduces overall expected income. Why might individuals still prefer it?",options:["They maximize expected utility rather than expected value","They are risk loving","They ignore probabilities","They prefer lower income"],a:0,tag:"risk",type:"interpretation",feedback:"Risk-averse individuals may accept lower expected income to eliminate uncertainty and increase utility."},
{id:115, q:"In a repeated game, cooperation breaks down when players heavily discount the future. Why?",options:["Future punishment is not valuable enough to deter defection","Players become risk neutral","The payoff matrix changes","Strategies become dominant"],a:0,tag:"game_theory",type:"interpretation",feedback:"If players value the future less, punishment threats lose power, making defection more attractive.",},    
{id:116, q:"A gamble pays $200 with probability 0.4 and $0 otherwise. A risk-averse individual rejects it. Why?",options:["The expected utility is lower than the utility of certainty","The expected value is negative","The probability is too low","The variance is zero"],a:0,tag:"risk",type:"calculation",feedback:"Even with positive expected value, risk-averse individuals may reject due to diminishing marginal utility."},
{id:117, q:"A risk-averse individual is offered two gambles with identical expected values, but one has higher variance. Which will they choose?",options:["The lower variance gamble","The higher variance gamble","They are indifferent","The gamble with higher probability"],a:0,tag:"risk",type:"interpretation",feedback:"Risk-averse individuals prefer lower variance when expected value is the same because utility is concave."},
{id:118, q:"A firm lowers its price in response to a competitor’s price cut, even though profits fall for both. What concept explains this outcome?",options:["Strategic interdependence","Adverse selection","Diminishing returns","Moral hazard"],a:0,tag:"game_theory",type:"interpretation",feedback:"Firms react to each other’s decisions because payoffs depend on mutual actions."},
{id:119, q:"An insurance market unravels completely as premiums rise and only the highest-risk individuals remain. What is this outcome called?",options:["Adverse selection death spiral","Moral hazard equilibrium","Pooling equilibrium","Risk neutrality"],a:0,tag:"insurance",type:"definition",feedback:"As low-risk individuals exit, premiums rise further, causing a collapse known as a death spiral."},
{id:120, q:"A player in a sequential game makes a move that reduces their own payoff but influences the opponent’s behavior favorably. What concept explains this?",options:["Strategic commitment","Dominant strategy","Mixed strategy","Adverse selection"],a:0,tag:"game_theory",type:"interpretation",feedback:"Players may sacrifice short-term payoff to credibly influence opponents’ expectations."},
{id:121, q:"A gamble offers a 50% chance of $100 and 50% chance of $0. A risk-neutral individual values it at what amount?",options:["$50","$100","$0","$25"],a:0,tag:"risk",type:"calculation",feedback:"Risk-neutral individuals evaluate gambles based on expected value: 0.5×100 = $50."},
{id:122, q:"Two firms collude successfully in a repeated game. What condition must hold for this to be sustainable?",options:["Future payoffs must be sufficiently valued","Firms must be risk neutral","The game must be one-shot","Communication must be binding"],a:0,tag:"game_theory",type:"interpretation",feedback:"Collusion is sustained when future punishment outweighs short-term cheating gains."},
{id:123, q:"An individual purchases insurance and then engages in riskier behavior. What problem does this illustrate?",options:["Moral hazard","Adverse selection","Strategic commitment","Focal point"],a:0,tag:"insurance",type:"definition",feedback:"Moral hazard arises when individuals take on more risk after being insured."},
{id:124, q:"A firm threatens to exit a market unless competitors reduce output, but exiting would hurt the firm more. Why is this threat ineffective?",options:["It is not credible","It is a dominant strategy","It changes payoffs","It creates equilibrium"],a:0,tag:"game_theory",type:"interpretation",feedback:"A threat that is not optimal to carry out is not credible and will not influence rivals."},

// =============================================
// ANSWER SHUFFLING — DO NOT MODIFY CORE LOGIC
// =============================================
// Randomizes answer choices while preserving
// the correct answer index.
//
// Steps:
// 1. Copy original question (prevents mutation)
// 2. Store correct answer value
// 3. Shuffle options
// 4. Recalculate correct index (q.a)
//
// ---------------------------------------------
// DO NOT MODIFY:
// - correct answer tracking logic
// - q.a reassignment
// - structure of returned object
//
// Breaking this WILL cause:
// - incorrect answers being marked correct
// - correct answers being marked wrong
//
// ---------------------------------------------
// SAFE TO EDIT:
// - adding extra fields (if needed)
// - minor formatting changes
//
// This function ensures fairness in answer order.
// =============================================    
function shuffleOptions(question){
    let q = {
        id: question.id,
		q: question.q,
        options: [...question.options],
        a: question.a,
        feedback: question.feedback,
        hint: question.hint,
        tag: question.tag,
        type: question.type,
		image: question.image
    };

    // Store correct answer BEFORE shuffle
    let correct = q.options[q.a];

    for(let i = q.options.length - 1; i > 0; i--){
        let j = Math.floor(Math.random() * (i + 1));
        [q.options[i], q.options[j]] = [q.options[j], q.options[i]];
    }

    // Recalculate correct index AFTER shuffle
    q.a = q.options.indexOf(correct);

    return q;
}

function getStrategicCooperation(){

let g = Math.round((Math.random()*0.6 + 0.3)*10)/10;

let coop = Math.floor(Math.random()*3)+2;
let cheat = coop + Math.floor(Math.random()*3)+1;
let punish = 1;

let cheatValue = cheat + (punish * (g/(1-g)));

let isCooperate = cooperateValue >= cheatValue;

let question = `Two players interact repeatedly. In each round:

- If both cooperate, each earns ${coop}

- After any defection, both players earn ${punish} forever

"Defect because immediate gains exceed the value of future cooperation",

"Defect because future payoffs do not influence current decisions"
];

let correct = isCooperate

};
}

    let question = filtered[Math.floor(Math.random() * filtered.length)];

   usedQuestions[poolName].push(question.id)
   
// Track types
lastTypes.push(question.type)
if(lastTypes.length > 3){
lastTypes.shift()
}

    return question;
}

function pickConceptQuestion(pool){
    if(!pool._remaining || pool._remaining.length === 0){
        pool._remaining = shuffle([...pool]);
    }
    return pool._remaining.pop();
}

// =============================================
// RANDOMIZATION SYSTEM — DO NOT MODIFY CORE LOGIC
// =============================================
// Controls fair, non-repeating selection of:
// - calculation generators
// - question pools
//
// Uses "shuffle + bag" system to ensure:
// - no immediate repeats
// - full coverage before reuse
//
// ---------------------------------------------
// SAFE TO EDIT:
// - adding new generators (calculationGenerators)
// - modifying pool content
//
// DO NOT MODIFY:
// - shuffle logic
// - bag system (calcBag, _remaining)
// - pop() usage
//
// Breaking this WILL cause:
// - repeated questions
// - uneven distribution
// - predictable patterns
//
// This ensures randomness WITHOUT repetition.
// =============================================    

// Fisher-Yates shuffle (uniform random order)
// Do not modify — ensures unbiased randomness    
function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// Bag system for calculation generators
// Ensures all generators are used before repeating    
let calcBag = [];

// Pulls one calculation generator from the bag
// Refills bag when empty (reshuffled)    
function pickCalcGenerator(){
    if(calcBag.length === 0){
        calcBag = shuffle([...calculationGenerators]);
    }
    return calcBag.pop();
}

// Generic bag-based random picker for any pool
// Prevents repeats until pool is exhausted    
function pickRandom(pool){
    if(!pool._remaining || pool._remaining.length === 0){
        pool._remaining = shuffle([...pool]);
    }
    return pool._remaining.pop();
}

             : (room === 10) ? "easyBoss"
             : (room <= 19) ? "medium"
             : (room === 20) ? "mediumBoss"
             : (room <= 25) ? "hard"
             : (room <= 29) ? "calculation"
             : "finalBoss";

const isBoss = diff.includes("Boss");
   
// Only reset health if the bossPool is currently empty (meaning a new encounter)
if (isBoss && (!bossPool || bossPool.length === 0)) {
    bossHealth = 3;
}
    
    // --- MUSIC CONTROL ---
    if(diff === "finalBoss"){
        playFinalBossMusic();

    shell.classList.toggle("boss-mode", isBoss);

	// 3. Select the Question
    if (isBoss) {
        // 1. If it's a new fight (Health 3), decide the "Theme" of the boss
        if (bossHealth === 3 || !bossPool || bossPool.length === 0) {
            const bank = [...questionBanks[diff]];
            let entries = Object.entries(conceptMemory || {});
            let chosenTag = null;

            if (entries.length > 0) {
                entries.sort((a, b) => b[1] - a[1]);
                chosenTag = entries[0][0];
            }

            bossPool = chosenTag 
                ? bank.filter(q => q.tag === chosenTag) 
                : [];

            if (bossPool.length < 3) {
                bossPool = bank.slice(0, 3);
            }
        }

        // 2. Select the specific question based on boss health
        currentQuestion = shuffleOptions(bossPool[3 - bossHealth]);

        // 3. Boss Identity UI (Logic moved ABOVE the return)
        let bTitle = room === 10 ? "DICE TYRANT" : room === 20 ? "UNDERWRITER OF FATE" : "THE CONVERGENCE";
        let bColor = room === 10 ? "#7dd3fc" : room === 20 ? "#38bdf8" : "#0ea5e9";

        questionElement.innerHTML = `

                ${currentQuestion.q}
            </div>`;

        // 4. THE CORRECT PLACEMENT OF RETURN
        // We draw the UI first, THEN we exit the function.
        displayQuestion(); 
        return; 

    } else {

    // --- STREAK ADAPTIVE LOGIC ---
    let adjustedDiff = diff;

    // --- FIND STRONGEST AREA (lowest weakness) ---
    let strongestTag = null;
    let lowestValue = Infinity;

    for(let tag in conceptMemory){
        if(conceptMemory[tag] < lowestValue){
            lowestValue = conceptMemory[tag];

            }

// =============================
// QUESTION SELECTION

if(adjustedDiff === "calculation"){

}
else if(adjustedDiff === "hard" && strongestTag){

    currentQuestion = shuffleOptions(

else{

if(currentQuestion.image){

// =============================================
// ANSWER HANDLER — CRITICAL SYSTEM
// =============================================
// Controls:
// - correct/incorrect logic
// - streaks
// - setbacks
// - boss damage
// - adaptive memory updates
//
// DO NOT MODIFY unless you understand:
// - conceptMemory
// - detour system
// - progression penalties
//
// Check for artifact names and CHANGE
    
function answer(choice) {
    // --- GLOBAL MEMORY DECAY ---
    for(let tag in conceptMemory){
    conceptMemory[tag] *= 0.95;
    }
   
    totalAttempts++;
   
    const isBossRoom = (room === 10 || room === 20 || room === 30);
    const msgElement = document.getElementById("message");
    const wizard = document.getElementById("wizardImage");
    const isCorrect = (choice === currentQuestion.a);

    // =============================================
    // 🔥 UPDATE STREAK FIRST (SOURCE OF TRUTH)
    // =============================================
    if (isCorrect) {
        streak++;
        if (streak > maxStreak) maxStreak = streak;
    } else {
        streak = 0;
    }
   
    // =============================================
    // 🔥 TRACK EVERYTHING (ONE LOCATION ONLY)
    // =============================================
    sendGameData({
        game: "The Strategic Vault",
        event: "question",
        user: username || "anonymous",
        room: room,
        question: currentQuestion.id || "unknown",
        correct: isCorrect ? 1 : 0,
        tag: currentQuestion.tag || "none",
        type: currentQuestion.type || "none",
        responseTime: Date.now() - questionStartTime,
	     attempt: totalAttempts ?? 0,
		  streak: streak ?? 0,
		  elapsedTime: startTime ? (Date.now() - startTime) : 0
    });

    // =============================================
    // ✅ CORRECT ANSWER LOGIC
    // =============================================
    if (isCorrect) {
        if(isBossRoom){
        sfxCorrect.pause();
        sfxCorrect.currentTime = 0;

        sfxBossHit.pause();
        sfxBossHit.currentTime = 0;
        sfxBossHit.play().catch(()=>{});
    } else {
        sfxBossHit.pause();
        sfxBossHit.currentTime = 0;

        sfxCorrect.pause();
        sfxCorrect.currentTime = 0;
        sfxCorrect.play().catch(()=>{});
    }
        wizardSpeak(getWizardFeedback("correct"));
       
        wizard.style.transform = "scale(1.1)";
        setTimeout(()=>{
        wizard.style.transform = "";
        },200);
       
        // If this was a concept detour question, return player to main path
        if(detourActive){
           detourActive = false;
           msgElement.innerHTML = `<span class='fade-out-text'>Correct! Concept restored. Moving deeper...</span>`;
           room = Math.min(room + 1, detourReturnRoom);
           localStorage.setItem("gauntletRoom", room);
           setTimeout(loadQuestion, TIMING.normal);
           return;
    }
        correctAnswers++;
        handleStreakVisuals();
    
        // --- LEARNING: reduce weakness ---
        if(currentQuestion.tag){
            conceptMemory[currentQuestion.tag] =
            (conceptMemory[currentQuestion.tag] || 0) * 0.7;
        }
        
       // --- BOSS HIT LOGIC ---
        if(isBossRoom){
        bossHealth--;
        
        msgElement.innerHTML = `<span style='color:#f87171;font-weight:bold;'>⚔ HIT! Boss Health: ${bossHealth}/3</span>`;
        triggerBossShake();
        
        if (bossHealth > 0) {
           setTimeout(loadQuestion, TIMING.boss);
           return;
        }
         // Boss defeated
         sendGameData({
            game: "The Strategic Vault",
            event: "boss_defeated",
            user: username,
            room: room
         });
           
         bossPool = [];
           
        // Boss defeated (CHANGE ARTIFACT NAMES)
        if(room === 10){
        document.getElementById("vaultDice").classList.add("unlocked");
        localStorage.setItem("vaultDice", "true");
        showArtifact(artifacts.dice.img, artifacts.dice.title, artifacts.dice.text);
        }

        if(room === 20){
        document.getElementById("vaultShield").classList.add("unlocked");
        localStorage.setItem("vaultShield", "true");
        showArtifact(artifacts.shield.img, artifacts.shield.title, artifacts.shield.text);
        }

        if(room === 30){
        document.getElementById("vaultCore").classList.add("unlocked");
        localStorage.setItem("vaultCore", "true");
        showArtifact(artifacts.core.img, artifacts.core.title, artifacts.core.text);
        }

// ... (Inside the Boss Victory check)
        showKnowledgeRoom(room);
        bossHealth = 3;
        bossPool = []; // Clear the pool so the next boss is fresh
        return; 
    } // <--- THIS ends the "if(isBossRoom)" block

    // --- NORMAL ROOM PROGRESSION ---
    // This code ONLY runs if choice === currentQuestion.a 
    // AND it wasn't a Boss Room (or a Detour).
    msgElement.innerHTML = "";
    room++;
    localStorage.setItem("gauntletRoom", room);
    showHallwayTransition(currentQuestion.feedback);
    return;
    }
    // =============================================
    // ❌ WRONG ANSWER LOGIC
    // =============================================

    if (isBossRoom) {
        sfxWrong.volume = 0.7;
    } else {
        sfxWrong.volume = 0.5;
    }

    sfxWrong.currentTime = 0;
    sfxWrong.play().catch(() => {});

    wizardSpeak(getWizardFeedback("wrong"));

    wizard.style.transform = "translateX(-6px)";
    setTimeout(() => {
        wizard.style.transform = "translateX(6px)";
        setTimeout(() => {
            wizard.style.transform = "";
        }, 100);
    }, 100);

    // --- LEARNING: increase weakness ---
    if (currentQuestion.tag) {
        conceptMemory[currentQuestion.tag] =
            (conceptMemory[currentQuestion.tag] || 0) + 1;
    }

    // --- DETOUR TRIGGER ---
    if (!detourActive && currentQuestion.tag && (conceptMemory[currentQuestion.tag] || 0) >= 2) {

        let conceptPool = null;

        if (room <= 9 && easyConceptPools[currentQuestion.tag]) {
            conceptPool = easyConceptPools[currentQuestion.tag];
        }

        if (room >= 11 && room <= 19 && mediumConceptPools[currentQuestion.tag]) {
            conceptPool = mediumConceptPools[currentQuestion.tag];
        }

        if (conceptPool) {
            detourActive = true;
            detourReturnRoom = room;

            currentQuestion = shuffleOptions(pickConceptQuestion(conceptPool));

            document.getElementById("question").innerText = "Concept Check: " + currentQuestion.q;
            document.getElementById("formulaHint").innerText =
                currentQuestion.hint ? "💡 Hint: " + currentQuestion.hint : "";

            msgElement.innerHTML = `<span class='fade-out-text'>You falter… The vault demands a concept check.</span>`;

            displayQuestion();
            return;
        }
    }

    // --- FALLBACK LOGIC ---
    document.getElementById("streakDisplay").innerText = "";

    bossHealth = 3;
    bossPool = [];

	let fallback = (room % 10 === 0 ? 3 : (room >= 21 ? 2 : 1));
	let newRoom = room - fallback;

// Never fall back behind the most recently cleared boss gate
	room = Math.max(bossCheckpoint, newRoom);

    localStorage.setItem("gauntletRoom", room);

    alert(`Incorrect! You trip in the darkness and tumble back to Room ${room}.`);

    loadQuestion();
}

// =============================================
// COMPLETION CODE GENERATOR — DO NOT MODIFY
// =============================================
// This function creates a unique verification code
// based on player performance:
//
// Inputs:
// - name (player)
// - accuracy (% correct)
// - streak (max streak)
// - total (questions answered)
//
// It generates a deterministic hash so that:
// - codes are reproducible
// - codes cannot be easily faked manually
//
// ---------------------------------------------
// DO NOT CHANGE:
// - string structure (name|acc|streak|total|ARCHIVE42)
// - hashing logic
// - return format ("ARCH-...")
//
// Changing this WILL:
// - invalidate all existing completion codes
// - break verification consistency
//
// ---------------------------------------------
// SAFE TO EDIT (if absolutely necessary):
// - "ARCHIVE42" → change only if rebranding ALL codes
// - "ARCH-" prefix → cosmetic only
//
// This is NOT encryption.
// It is a lightweight integrity check.
// =============================================
function generateCode(name, acc, streak, total){
    let str = `${name}|${acc}|${streak}|${total}|VAULT42`;
    let hash = 0;

    for(let i = 0; i < str.length; i++){
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0;
    }

    return "VAULT-" + Math.abs(hash).toString(36).toUpperCase();
}

// =============================================
// ARRAY SHUFFLE UTILITY — SAFE TO USE, DO NOT MODIFY
// =============================================
// Fisher-Yates shuffle algorithm.
//
// Used to randomize:
// - question order
// - calculation generators
// - any randomized sequences
//
// DO NOT MODIFY unless you understand:
// - uniform randomness
// - bias in random selection
//
// Breaking this = predictable patterns in questions
// =============================================    
function shuffleArray(arr){
    for(let i=arr.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;
}

// HIGH SCORE TRACKING — OPTIONAL FEATURE
// =============================================
// Stores top completion times in browser (localStorage)
//
// - Saves name, time, and date
// - Sorts fastest → slowest
// - Keeps top 5 results only
//
// SAFE TO EDIT:
// - number of scores kept (slice)
// - displayed fields (name/date)
//
// WARNING:
// Clearing browser data will erase scores.
// =============================================    
function updateHighScores(newTimeMs) {
    let scores = JSON.parse(localStorage.getItem("gauntletHighScores")) || [];
    scores.push({ name: username, time: newTimeMs, date: new Date().toLocaleDateString() });
    
    // Sort by time (lowest/fastest first) and keep top 5
    scores.sort((a, b) => a.time - b.time);
    scores = scores.slice(0, 5);
    
    localStorage.setItem("gauntletHighScores", JSON.stringify(scores));
    return scores;
}

// =============================================
// TIME FORMATTER — SAFE UTILITY
// =============================================
// Converts milliseconds → readable format (Xm Ys)
//
// Used for:
// - victory screen
// - performance tracking
//
// Safe to modify format if desired.
// =============================================
function formatTime(ms) {
    let mins = Math.floor(ms / 60000);
    let secs = Math.floor((ms / 1000) % 60);
    return `${mins}m ${secs}s`;
}
