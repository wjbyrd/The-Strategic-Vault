<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Archives of Microeconomics</title>
<style>
body{
font-family:Arial,sans-serif;
margin:0;
padding:0;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
color: white;

background:
linear-gradient(rgba(2,6,23,.8),rgba(2,6,23,.8)),
url('question_background_image.jpeg');

background-size:cover;
background-position:center;
background-attachment:scroll;
}
@keyframes torchFlicker {
0%   { filter: brightness(1); }
25%  { filter: brightness(1.05); }
50%  { filter: brightness(0.97); }
75%  { filter: brightness(1.04); }
100% { filter: brightness(1); }
}
#gameBox{
max-width:720px;
width:90%;
min-height:75vh;
margin:20px auto;
padding:26px;
text-align:center;
background:#111827;
border-radius:14px;
box-sizing:border-box;
box-shadow:0 0 40px rgba(0,0,0,0.8),0 0 20px rgba(251,191,36,0.1),inset 0 0 30px rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.05);
animation:torchFlicker 6s infinite;
transition:box-shadow .3s ease;
position:relative;
}
.hit { box-shadow: 0 0 60px #ef4444, inset 0 0 40px #7f1d1d !important; animation: shake 0.4s ease; }
#autosave { position: absolute; top: 15px; right: 15px; font-size: 11px; opacity: 0.5; font-style: italic; }
button{
padding:12px 22px; margin:8px; font-size:16px; cursor:pointer;
background:#374151; color:white; border:none; border-radius:8px; transition:all 0.2s ease;
}
button:hover{ background:#4b5563; transform:translateY(-2px); }
h2{ text-shadow: 0 0 10px rgba(255,255,255,0.3), 0 0 20px rgba(251,191,36,0.2); margin-bottom: 5px;}
#mazeTrack{ font-size:22px; line-height:32px; letter-spacing:2px; margin-bottom:10px; display: inline-block; text-shadow:0 0 10px rgba(34,197,94,0.6); }
#progressBar{ width:100%; height:22px; background:#2d3748; border-radius:12px; margin-bottom:20px; overflow:hidden; }
#progressFill{ height:100%; width:0%; background:linear-gradient(90deg,#f59e0b,#ef4444); transition:width 0.4s ease; }
.boss-title { font-size: 28px; font-weight: bold; margin-bottom: 15px; display: block; }
.area-title { color: #9ca3af; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 15px; }
.hint-box { font-size: 13px; color: #fbbf24; margin-top: 15px; opacity: 0.8; height: 18px; }

@keyframes shake { 0% { transform:translateX(0); } 25% { transform:translateX(-8px); } 50% { transform:translateX(8px); } 75% { transform:translateX(-6px); } 100% { transform:translateX(0); } }
@keyframes victoryGlow { 0% { transform:scale(1); text-shadow:0 0 10px gold; } 50% { transform:scale(1.1); text-shadow:0 0 25px gold, 0 0 40px orange; } 100% { transform:scale(1); text-shadow:0 0 10px gold; } }
.victory{ animation:victoryGlow 1.5s ease-in-out infinite; color: gold !important; }  
  .dungeon-container {
    position: relative;
    display: flex;
    gap:40px;
    justify-content: center;
    align-items: flex-start;
    padding-top: 40px;
}

.fade-out-text {
    animation: fadeOut 5s forwards;
    font-weight: bold;
    color: #4ade80; /* A nice success green */
}

@keyframes fadeOut {
    0% { opacity: 1; }
    70% { opacity: 1; } /* Stay fully visible for 3.5 seconds */
    100% { opacity: 0; } /* Fade out over the last 1.5 seconds */
}
  
#question {
    font-size: 20px; /* Increased from your current size */
    line-height: 1.4;
    font-weight: 500;
    margin: 20px 0;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5); /* Adds depth for readability */
}

.answers{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:14px;
}

.answers button{
flex:1 1 200px;
max-width:320px;
}
    
/* Also updating the Boss question text specifically */
.boss-q {
    font-style: italic;
    font-size: 24px; /* Matching the new standard size */
    border-left: 4px solid var(--bossColor);
    padding-left: 15px;
    margin: 20px 0;
    text-align: left;
}
  
#mazeTrack {
    display: grid;
    grid-template-columns: repeat(10, 36px);
    justify-content: center;
    gap: 10px;
    margin: 25px auto;
}
       
.maze-box{
    width:36px;
    height:36px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    border-radius:6px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    transition:all 0.3s ease;
}

.maze-box.active {
    background: rgba(251, 191, 36, 0.3);
    border: 2px solid #fbbf24;
    z-index: 10;
    animation: activePulse 0.8s infinite alternate;
}
  
@keyframes activePulse {
    0% { box-shadow: 0 0 5px #fbbf24; transform: scale(1.1); }
    100% { box-shadow: 0 0 20px #fbbf24; transform: scale(1.2); }
}
  
/* Gives a faint, constant aura to the boss rooms */
.maze-box:nth-child(10) { text-shadow: 0 0 5px #fbbf24; }
.maze-box:nth-child(20) { text-shadow: 0 0 10px #a855f7; }
.maze-box:nth-child(30) { text-shadow: 0 0 15px #ef4444; }
  
#gameBox.boss-mode {
    border: 2px solid #ef4444;
    box-shadow: 0 0 50px rgba(239, 68, 68, 0.4), inset 0 0 20px rgba(239, 68, 68, 0.2);
}
   
.torch{
position:absolute;
width:70px;
top:30px;
z-index:10;
animation: torchFlicker 3s infinite alternate;
pointer-events:none;
opacity:.95;
filter: drop-shadow(0 0 12px rgba(255,180,80,.7));
}

.left-torch{
left:18px;
}

.right-torch{
right:18px;
transform:scaleX(-1);
}
  
@keyframes bossShake {
0% { transform: translate(0,0); }
20% { transform: translate(-20px,14px); }
40% { transform: translate(20px,-14px); }
60% { transform: translate(-18px,-16px); }
80% { transform: translate(18px,16px); }
100% { transform: translate(0,0); }
}

.boss-shake{
animation: bossShake 0.6s ease;
}

.fullscreenBtn{
position:absolute;
top:12px;
left:12px;
background:#374151;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}
    
#startScreen {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background-image: url('start_screen_image.png'); 
background-size: cover; 
background-position: center; 
background-repeat: no-repeat;
z-index: 100;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
}

@media (max-width:600px){

#mazeTrack div{
width:20px;
height:20px;
}

#gameBox{
transform:scale(0.95);
transform-origin:top center;
}

.answers button{
flex:1 1 100%;
}
}

#hallwayTransition{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
url('hallway1.png');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
font-size:26px;
letter-spacing:2px;
z-index:200;
opacity:0;
pointer-events:none;
transition:opacity 1.2s ease;
animation: hallwayZoom 3.2s linear forwards;
}

#hallwayTransition.active{
opacity:1;
}

#hallwayText{
max-width:600px;
background:rgba(0,0,0,0.55);
padding:30px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 0 25px rgba(0,0,0,0.6);
}


#artifactDrop{
margin-top:20px;
padding:14px;
background:rgba(15,23,42,.6);
border-radius:10px;
border:1px solid rgba(99,102,241,.35);
text-align:center;
}

#artifactImage{
width:96px;
margin-bottom:8px;
}
  
#artifactDrop img{
filter: drop-shadow(0 0 12px rgba(56,189,248,.8));
}

#artifactVault{
margin-top:60px;
width:260px;
padding:18px;
border-radius:12px;
background:linear-gradient(180deg,#020617,#020617 60%,#020617 100%);
box-shadow:0 0 25px rgba(56,189,248,.15);
border:1px solid rgba(56,189,248,.25);
text-align:center;
display:none;
}

#artifactVault h3{
color:#60a5fa;
margin:0 0 14px 0;
}

.vaultRow{
display:flex;
flex-direction:column;
align-items:center;
gap:18px;
}

.artifactSlot{
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
width:110px;
opacity:.25;
transition:all .4s ease;
text-align:center;
}

.artifactSlot img{
width:64px;
filter:grayscale(1);
transition:all .4s ease;
}

.artifactSlot span{
display:block;
font-size:13px;
color:#94a3b8;
margin-top:8px;
line-height:1.2;
text-align:center;
}

/* UNLOCKED STATE */
.artifactSlot.unlocked{
opacity:1;
transform:scale(1.05);
}

@keyframes relicPulse{
0%{ filter: drop-shadow(0 0 8px #38bdf8); }
50%{ filter: drop-shadow(0 0 18px #60a5fa); }
100%{ filter: drop-shadow(0 0 8px #38bdf8); }
}

.artifactSlot.unlocked img{
filter:drop-shadow(0 0 14px rgba(56,189,248,.9));
animation:relicPulse 3s infinite;
}

.artifactSlot.unlocked span{
color:#e2e8f0;
font-weight:600;
}
 
  
/* Boss Images */

.bossIcon{
width:96px;
height:auto;
display:block;
margin:0 auto 12px auto;
animation:bossFloat 4s ease-in-out infinite;
}

.tyrantGlow{
filter:drop-shadow(0 0 14px rgba(96,165,250,.8));
}

.underwriterGlow{
filter:drop-shadow(0 0 14px rgba(168,85,247,.8));
}

.finalBoss{
filter:drop-shadow(0 0 18px rgba(239,68,68,.9));
}

/* Floating animation */

@keyframes bossFloat{
0%{transform:translateY(0);}
50%{transform:translateY(-6px);}
100%{transform:translateY(0);}
}

</style>
</head>
<body>
  <div id="srAnnouncements"
     aria-live="assertive"

<div id="startScreen">

<script>
const bgMusic = new Audio('monk_chant.wav'); 
bgMusic.loop = true; 
bgMusic.volume = 0.1; 

const bossMusic = new Audio('boss_battle_music.wav');
bossMusic.loop = true;
bossMusic.volume = 0.10;
  
const sfxMilestone = new Audio('streak.wav');
const sfxVictory = new Audio('victory.wav');

function playBossMusic(){

if(!bossMusic.paused) return;

bgMusic.pause();
bossMusic.currentTime = 0;
bossMusic.play().catch(e=>console.log("Boss music blocked"));

}

function playExplorationMusic(){
bossMusic.pause();
if(!bgMusic.paused) return;
bgMusic.currentTime = 0;
bgMusic.play().catch(e=>console.log("Music blocked"));
}

const hallwayImages = [
"hallway1.png",
"hallway2.png",
"hallway3.png"
];
  
function goFullscreen(){
let el = document.documentElement;

if (el.requestFullscreen) {
    el.requestFullscreen();
} 
else if (el.webkitRequestFullscreen) { // Safari
    el.webkitRequestFullscreen();
} 
else if (el.msRequestFullscreen) { // old Edge
    el.msRequestFullscreen();
}
}
    
// 1. Initial UI State: Hide game until startGame runs
document.getElementById("gameBox").style.display = "none";
document.querySelectorAll(".torch").forEach(t => t.style.display = "none");

// 2. Global Variables (Declared only ONCE)
let totalAttempts = 0;
let bossHealth = 3; 
let bossPool = [];
let correctAnswers = 0; 
let maxStreak = 0; 
let username = "";
let streak = 0; 
let startTime; // Will be set in startGame()
let room = localStorage.getItem("gauntletRoom") ? parseInt(localStorage.getItem("gauntletRoom")) : 1;
let currentQuestion = null;
let detourActive = false;
let detourReturnRoom = null;
let lastTypes = [];
let easyCycle = 0 ;
let mediumCycle = 0;
let usedQuestions = {
easy: [],
medium: [],
hard: [],
easyBoss: [],
mediumBoss: [],
finalBoss: []
};
let conceptMemory = {
budget:0,
demand:0,
indifference:0,
elasticity:0,
equilibrium:0
};

const artifacts = {
dice:{
img:"dice_of_probability.png",
title:"Loaded Dice of Probability",
text:"Arcane dice once wielded by the Dice Tyrant. They reveal that uncertainty is not chaos—every gamble has an expected value determined by probabilities and payoffs."
},

shield:{
img:"shield_of_risk_pooling.png",
title:"Shield of Risk Pooling",
text:"Forged from the shared risks of many travelers. This shield embodies the power of insurance—losses become manageable when risk is pooled across many individuals."
},

crown:{
img:"crown_of_strategy.png",
title:"Crown of Strategy",
text:"The crown of the Grand Strategist. It reveals the logic of strategic thinking—every decision depends on anticipating the actions of others."
}

};
  
// Restore saved username if it exists
const savedUser = localStorage.getItem("gauntletUser");
if(savedUser){
document.getElementById("usernameInput").value = savedUser;
}

// 3. Entry Logic
function startGame() {
    let inputName = document.getElementById("usernameInput").value.trim();
    if (!inputName) {
        alert("A name is required to bind your soul to the archives.");
        return;
    }
    
    username = inputName;
    localStorage.setItem("gauntletUser", username);

  questionHistory = {
  easy: [], medium: [], hard: [], calculation: [],
  easyBoss: [], mediumBoss: [], finalBoss: []
  };

  easyIndex = {
  risk:{definition:0,interpretation:0,calculation:0},
  insurance:{definition:0,interpretation:0,calculation:0},
  game_theory:{definition:0,interpretation:0,calculation:0}
  };

  mediumIndex = JSON.parse(JSON.stringify(easyIndex));

  easyCycle = 0;
  mediumCycle = 0;
  easyTagCycle = 0;
  mediumTagCycle = 0;

    // RESET GAME STATE
    room = 1;
    bossHealth = 3;
    streak = 0;
    maxStreak = 0;
    totalAttempts = 0;
    correctAnswers = 0;
    bossPool = [];
    calcBag = [];
    localStorage.removeItem("gauntletRoom");
    localStorage.removeItem("vaultDice");
    localStorage.removeItem("vaultShield");
    localStorage.removeItem("vaultCrown");
    
    // Reveal the game and torches
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("gameBox").style.display = "block";
    document.getElementById("artifactVault").style.display = "block";
    document.querySelectorAll(".torch").forEach(t => t.style.display = "block");
    
  if(localStorage.getItem("vaultDice")){
        document.getElementById("vaultDice").classList.add("unlocked");
    }

    if(localStorage.getItem("vaultShield")){
        document.getElementById("vaultShield").classList.add("unlocked");
    }

    if(localStorage.getItem("vaultCrown")){
        document.getElementById("vaultCrown").classList.add("unlocked");
    }
  
    // Start atmosphere and timer
    bgMusic.play().catch(e => console.log("Audio started"));
    startTime = Date.now(); 
    loadQuestion();
}

// 4. Enter Key Support
document.getElementById("usernameInput").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        startGame();
    }
});

// 5. Your Lore & Logic (Area Names)
function getAreaName(r) {
    if (r <= 9) return "The Vault of Chance";
    if (r === 10) return "The Dice Tyrant's Pit";
    if (r <= 19) return "The Hall of Uncertainty";
    if (r === 20) return "The Underwriter's Lair";
    if (r <= 25) return "The Chamber of Risk";
    if (r <= 29) return "The Strategic Corridor";
    return "The Grand Strategist's Throne";
}
  
// --- Question Pools follow below ---
  
const questionBanks = {
easyBoss:[
{q:"The Dice Tyrant whispers: 'Fortune favors those who understand the odds.' What does expected value represent in a gamble?",options:["The long-run average payoff if the gamble were repeated many times","The most likely payoff from a single outcome","The largest possible payoff","The payoff with the highest probability"],a:0,feedback:"Expected value represents the long-run average payoff when probabilities are used to weight each possible outcome."},
{q:"The Dice Tyrant rolls three glowing dice. A gamble pays $100 with probability 0.4, $50 with probability 0.4, and $0 with probability 0.2. What is the expected value?",options:["$60","$70","$50","$80"],a:0,feedback:"Expected value = (100×0.4) + (50×0.4) + (0×0.2) = 40 + 20 + 0 = $60."},
{q:"The Dice Tyrant offers two gambles. Gamble A has an expected value of $45. Gamble B has an expected value of $60. A risk-neutral player would choose...",options:["Gamble B","Gamble A","Either gamble","The gamble with the highest variance"],a:0,feedback:"Risk-neutral decision makers choose the option with the highest expected value."}
],
mediumBoss:[
{q:"The Underwriter of Fate studies your choices. A gamble has an expected value of $0, yet you refuse to take it. What does this reveal?",options:["You are risk averse due to diminishing marginal utility","You miscalculated the expected value","You are risk loving","You prefer higher variance outcomes"],a:0,feedback:"Risk-averse individuals reject fair gambles because the expected utility is lower than the utility of a certain outcome due to diminishing marginal utility."},
{q:"The Underwriter presents a contract. Fair insurance has a premium equal to the expected loss. Why might a risk-averse person still be willing to pay more than this?",options:["They value certainty more than the expected monetary outcome","They expect to make a profit from insurance","They misunderstand probabilities","They are risk neutral"],a:0,feedback:"Risk-averse individuals maximize expected utility, not expected value, and are willing to pay extra to eliminate uncertainty."},
{q:"Final judgment from the Underwriter. If insurance companies offered only fair insurance, what problem would most directly threaten their survival?",options:["Administrative costs exceeding premiums","Consumers becoming risk neutral","Demand for insurance disappearing","All risks becoming insurable"],a:0,feedback:"Even if premiums equal expected losses, insurers must cover administrative costs and profit margins, making purely fair insurance unsustainable."}
],
finalBoss:[
{q:"The Strategist of Eternity begins. In a one-shot Prisoner's Dilemma, both players choose to betray even though mutual cooperation is better. Why?",options:["Betrayal is a dominant strategy and each player best responds to the other","Players care about total welfare","Communication enforces cooperation","Random strategies dominate"],a:0,feedback:"In a one-shot game, each player’s best response is to betray regardless of what the other does, leading to a Nash equilibrium that is not socially optimal."},
{q:"The Strategist advances. In a sequential game, Player A moves first and Player B responds after observing A’s choice. What solution concept rules out empty threats?",options:["Subgame perfect equilibrium","Dominant strategy equilibrium","Mixed strategy equilibrium","Pareto efficiency"],a:0,feedback:"Subgame perfect equilibrium requires strategies to be optimal in every subgame, eliminating non-credible threats."},
{q:"Final judgment. A Prisoner's Dilemma is repeated indefinitely. Under what condition can cooperation be sustained?",options:["When the probability of future interaction is high enough","Only when players are risk neutral","Only in one-shot games","When players cannot observe each other"],a:0,feedback:"In repeated games, cooperation can emerge if players value future payoffs enough—meaning the probability of continuation is sufficiently high."}
],
    easy: [
{id:1,q:"Expected value represents...",options:["The average outcome weighted by probabilities","The highest possible payoff","The lowest payoff","The most common outcome"],a:0,tag:"risk",type:"definition",feedback:"Expected value multiplies each outcome by its probability and sums the results."},
{id:2,q:"A gamble pays $100 with probability 0.5 and $0 with probability 0.5. What is the expected value?",options:["$50","$25","$75","$100"],a:0,tag:"risk",type:"calculation",feedback:"Expected value = (100 × 0.5) + (0 × 0.5) = $50."},
{id:3,q:"A risk-averse person prefers...",options:["A certain outcome over an equal-value gamble","A risky outcome with equal expected value","The gamble with the highest variance","Random outcomes"],a:0,tag:"risk",type:"definition",feedback:"Risk-averse individuals prefer certainty even when expected value is the same."},
{id:4,q:"If a person buys insurance, it usually means they are...",options:["Risk averse","Risk neutral","Risk loving","Strategic"],a:0,tag:"insurance",type:"interpretation",feedback:"Insurance is most attractive to people who dislike uncertainty."},

};

// generating random questions for medium and hard 
function getRiskMedium(){

// random probability (0.2 to 0.8)
let p = (Math.floor(Math.random()*7)+2)/10;

// random payoff ($50 to $200)
let payoff = (Math.floor(Math.random()*4)+1)*50;

// expected value
let ev = Math.round(p * payoff);

// distractors
let wrong1 = payoff;
let wrong2 = Math.round(payoff/2);
let wrong3 = 0;

// shuffle options
let options = [ev, wrong1, wrong2, wrong3];
let correct = ev;

shuffleArray(options);

return {
q:`A gamble pays $${payoff} with probability ${p} and $0 otherwise. What is the expected value?`,
options: options.map(o=>"$"+o),
a: options.indexOf(correct),
type:"calculation",
tag:"risk",
feedback:`Expected value = ${p} × ${payoff} = $${ev}.`
};

}

function getInsuranceMedium(){

// probability (0.05 to 0.30)
let p = (Math.floor(Math.random()*6)+1)*0.05;

// loss ($500 to $2000)
let loss = (Math.floor(Math.random()*4)+1)*500;

// expected loss
let ev = Math.round(p * loss);

// premium slightly above expected loss
let premium = ev + (Math.floor(Math.random()*3)+1)*20;

// distractors
let wrong1 = loss;
let wrong2 = Math.round(loss/2);
let wrong3 = ev - 20;

// correct answer
let correctText = "Buy the insurance";

// options
let options = [
"Buy the insurance",
"Do not buy the insurance",
"Indifferent between buying and not buying",
"Need more information"
];

// shuffle
shuffleArray(options);

return {
q:`An insurance policy covers a $${loss} loss with probability ${p}. The premium is $${premium}. A risk-averse individual will most likely...`,
options: options,
a: options.indexOf(correctText),
type:"interpretation",
tag:"insurance",
feedback:`Expected loss is $${ev}. A risk-averse individual may still buy insurance to avoid uncertainty, even if the premium is higher.`
};

}
  
function getStrategicDominant(){

// --- Generate Player A payoffs (force dominance) ---
let base1 = Math.floor(Math.random()*5)+1;
let base2 = Math.floor(Math.random()*5)+1;

// A: Up always better than Down
let TL_A = base1 + 3;
let BL_A = base1;

let TR_A = base2 + 3;
let BR_A = base2;

// --- Generate Player B payoffs (random, irrelevant to A's dominance) ---
let TL_B = Math.floor(Math.random()*5)+1;
let TR_B = Math.floor(Math.random()*5)+1;
let BL_B = Math.floor(Math.random()*5)+1;
let BR_B = Math.floor(Math.random()*5)+1;

// --- Build clean matrix ---
let question = `Player A chooses between Up or Down. Player B chooses Left or Right.

Payoff matrix (A,B):

            B: Left        B: Right  
A: Up       (${TL_A},${TL_B})     (${TR_A},${TR_B})  
A: Down     (${BL_A},${BL_B})     (${BR_A},${BR_B})  

What is Player A’s dominant strategy?`;

let options = ["Up","Down","No dominant strategy","Depends on B"];
let correct = "Up";

shuffleArray(options);

return {
q: question,
options: options,
a: options.indexOf(correct),
tag:"game_theory",
feedback:"Compare Player A’s payoffs across each column. Up yields a higher payoff than Down regardless of Player B’s choice."
};

}

function getStrategicNash(){

// generate base payoffs
let a = Math.floor(Math.random()*4)+2;
let b = Math.floor(Math.random()*4)+1;

// build a Prisoner's Dilemma style structure
let matrix = {
TL:[a,a],        // cooperate
TR:[1,b+2],      // A cooperates, B defects
BL:[b+2,1],      // A defects, B cooperates
BR:[2,2]         // both defect (Nash)
};

let question = `Two players choose between Cooperate or Defect.

Payoff matrix (A,B):

                B: Coop        B: Defect  
A: Coop         (${matrix.TL})      (${matrix.TR})  
A: Defect       (${matrix.BL})      (${matrix.BR})  

What is the Nash equilibrium?`;

let options = [
"(Cooperate, Cooperate)",
"(Cooperate, Defect)",
"(Defect, Cooperate)",
"(Defect, Defect)"
];

let correct = "(Defect, Defect)";

shuffleArray(options);

return {
q: question,
options: options,
a: options.indexOf(correct),
tag:"game_theory",
feedback:"Both players defect because it is the best response to the other’s action. Neither can improve by deviating."
};

}

function getStrategicBestResponse(){

let upLeft = Math.floor(Math.random()*5)+1;
let downLeft = upLeft + Math.floor(Math.random()*3)+1;

let upRight = Math.floor(Math.random()*5)+1;
let downRight = upRight - Math.floor(Math.random()*2);

let question = `Player B chooses Left or Right. Player A must respond.

Payoffs to Player A:

            B: Left     B: Right  
A: Up       ${upLeft}          ${upRight}  
A: Down     ${downLeft}          ${downRight}  

If Player B chooses Left, what is Player A’s best response?`;

let options = ["Up","Down","Both are equal","Cannot determine"];
let correct = (downLeft > upLeft) ? "Down" : "Up";

shuffleArray(options);

return {
q: question,
options: options,
a: options.indexOf(correct),
tag:"game_theory",
feedback:"A best response is the action that gives the highest payoff given the opponent’s choice."
};

}

function getStrategicCooperation(){

// probability game continues (0.3 to 0.9)
let g = Math.round((Math.random()*0.6 + 0.3)*10)/10;

// cooperation payoff per round
let coop = Math.floor(Math.random()*3)+2;   // 2–4

// cheat payoff (temptation)
let cheat = coop + Math.floor(Math.random()*3)+1; // always higher

// punishment payoff after cheating
let punish = 1;

// present value style comparison (simplified intuition)
let cooperateValue = coop / (1 - g);
let cheatValue = cheat + (punish * (g/(1-g)));

// correct answer
let correct = (cooperateValue >= cheatValue) ? "Cooperate" : "Defect";

let question = `Two players are in a repeated game. Each round:

- If both cooperate, each earns ${coop}
- If one defects, they earn ${cheat} while the other gets 0
- After any defection, both players earn ${punish} forever

The probability the game continues each round is ${g}.

What is the best strategy?`;

let options = [
"Cooperate",
"Defect",
"Mix strategies",
"Depends only on current payoff"
];

shuffleArray(options);

return {
q: question,
options: options,
a: options.indexOf(correct),
tag:"game_theory",
feedback:`Cooperation value ≈ ${cooperateValue.toFixed(1)}, deviation value ≈ ${cheatValue.toFixed(1)}. If future payoffs matter enough, cooperation is sustained.`
};

}

}

function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

let calcBag = [];

function pickCalcGenerator(){

    if(calcBag.length === 0){
        calcBag = shuffle([...calculationGenerators]);
    }

    return calcBag.pop();
}

function weightedPick(pool){

let weightedPool = [];

pool.forEach(q => {

let weight = 1;

if(q.tag && conceptMemory[q.tag]){
weight += conceptMemory[q.tag];
}

for(let i = 0; i < weight; i++){
weightedPool.push(q);
}

});

return weightedPool[Math.floor(Math.random()*weightedPool.length)];

}
  
function pickRandom(pool){
    if(!pool._remaining || pool._remaining.length === 0){
        pool._remaining = shuffle([...pool]);
    }
    return pool._remaining.pop();
}

                <p>🎯 Accuracy: <strong>${accuracy}%</strong> | 🔥 Best Streak: <strong>${maxStreak}</strong></p>
                <p>⏱️ Time: <strong>${timeString}</strong> | 📝 Total Questions: <strong>${totalAttempts}</strong></p>
                <p style="font-size: 0.8em; color: #9ca3af;">🔑 Verification Code: <span id="vCode">${verificationCode}</span></p>
            </div>
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
                <button id="shareBtn" onclick="copyResults()" style="background:#4ade80; color:black; font-weight:bold; padding:12px 24px; border:none; border-radius:6px; cursor:pointer;">
                    📋 Copy Results
                </button>
                <button onclick="location.reload()" style="background:transparent; color:white; border:1px solid white; padding:12px 24px; border-radius:6px; cursor:pointer;">
                    Try Again
                </button>
            </div>
        </div>
    `;
}
  
function showKnowledgeRoom(bossRoom) {
    playExplorationMusic();  
  
    const qContainer = document.getElementById("question");
    const aContainer = document.getElementById("answers");
    const msgElement = document.getElementById("message");
  
  
    // Clear the "Correct!" fade-out text so it doesn't stay on the summary screen
    msgElement.innerText = "";
    msgElement.className = "";
    
    let title = "";
    let summary = "";

if (bossRoom === 10) {
    title = "DICE TYRANT DEFEATED (Archive 10.1)";
    summary = "The Dice Tyrant collapses and the Loaded Dice of Probability fall silent. You now understand the power of Expected Value — uncertain outcomes can be evaluated by weighting payoffs by their probabilities. What once seemed like pure chance now reveals its hidden logic. The Labyrinth grows deeper...";
} else if (bossRoom === 20) {
    title = "UNDERWRITER OF FATE DEFEATED (Archive 20.1)";
    summary = "With the Underwriter of Fate defeated, you claim the Shield of Risk Pooling. You have learned how insurance transforms uncertainty by spreading risk across many individuals. Through pooling and protection, even the greatest financial dangers can be managed.";
} else if (bossRoom === 30) {
    title = "GRAND STRATEGIST DEFEATED (Final Archive)";
    summary = "The Grand Strategist falls and the Crown of Strategy is yours. You now understand how rational players anticipate the choices of others. Through dominant strategies, Nash equilibrium, and strategic reasoning, you have mastered the logic of competitive decision-making.";
}

    // Update the UI
    qContainer.innerHTML = `
        <span class="boss-title" style="color:#60a5fa; text-shadow: 0 0 15px #60a5fa;">${title}</span>
        <div class="boss-q" style="--bossColor:#60a5fa; font-style: normal; border-left-color: #60a5fa;">${summary}</div>
    `;
    
    // logic to ensure Room 30 triggers the end game, while 10 and 20 trigger the next level
    let nextAction = bossRoom === 30
    ? "handleVictory()"
    : "room++; localStorage.setItem('gauntletRoom', room); loadQuestion();";
    let buttonLabel = bossRoom === 30 ? "FINALIZE THE ARCHIVE CONQUEST →" : `CONTINUE TO ROOM ${bossRoom + 1} →`;

    aContainer.innerHTML = `
        <button onclick="${nextAction}" 
                style="background:#60a5fa; color:black; font-weight:bold; width:100%; padding:20px; font-size:18px; box-shadow: 0 0 20px rgba(96, 165, 250, 0.5); border:none; border-radius:8px; cursor:pointer;">
                ${buttonLabel}
        </button>`;
}
    
  
function shuffleArray(arr){
    for(let i=arr.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;
}

function updateHighScores(newTimeMs) {
    let scores = JSON.parse(localStorage.getItem("gauntletHighScores")) || [];
    scores.push({ name: username, time: newTimeMs, date: new Date().toLocaleDateString() });
    
    // Sort by time (lowest/fastest first) and keep top 5
    scores.sort((a, b) => a.time - b.time);
    scores = scores.slice(0, 5);
    
    localStorage.setItem("gauntletHighScores", JSON.stringify(scores));
    return scores;
}

function formatTime(ms) {
    let mins = Math.floor(ms / 60000);
    let secs = Math.floor((ms / 1000) % 60);
    return `${mins}m ${secs}s`;
}

function copyResults() {
    const totalTimeMs = Date.now() - startTime;
    const timeString = formatTime(totalTimeMs);
    const code = document.getElementById("vCode").innerText;
    const accuracy = Math.round((correctAnswers / totalAttempts) * 100);
    const shareText = `🎮 Labyrinth of Risk and Strategy Conquered!\n👤 Adventurer: ${username}\n⏱️ Time: ${timeString}\n🎯 Accuracy: ${accuracy}%\n🔥 Best Streak: ${maxStreak}\n📝 Total Questions: ${totalAttempts}\n🔑 Verification Code: ${code}`;
    
    navigator.clipboard.writeText(shareText).then(() => {
        const btn = document.getElementById("shareBtn");
        const originalText = btn.innerText;
        btn.innerText = "✅ Copied to Clipboard!";
        btn.style.background = "#059669";
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = "#374151";
        }, 2000);
    });
}
</script>
