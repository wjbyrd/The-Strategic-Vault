   1. GLOBAL LAYOUT & BACKGROUND
========================================= */

    padding: 0;

    justify-content: center;

}

.dungeon-container {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 40px;
    width: 100%;
    max-width: 1100px;
    margin-top: 20px;
}

/* =========================================
   2. CORE GAME UI (#gameBox)
========================================= */
#gameBox {

    min-width:0;
    max-width:720px;
    width:100%;

}

#gameBox.boss-mode {
border: 2px solid #60a5fa;
box-shadow: 0 0 40px rgba(96,165,250,0.4);
}

.hit { box-shadow: 0 0 60px #ef4444, inset 0 0 40px #7f1d1d !important; animation: hitshake 0.4s ease; }
#autosave { position: absolute; top: 15px; right: 15px; font-size: 11px; opacity: 0.5; font-style: italic; }

/* =========================================
   3. TEXT & HEADERS
========================================= */
h2 { text-shadow: 0 0 10px rgba(255,255,255,0.3), 0 0 20px rgba(251,191,36,0.2); margin-bottom: 5px; }
#question { font-size: 20px; line-height: 1.4; font-weight: 500; margin: 14px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
.boss-title { font-size: 28px; font-weight: bold; margin-bottom: 15px; display: block; }
.area-title { color: #9ca3af; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 15px; }

.hint-box { font-size: 13px; color: #fbbf24; margin-top: 15px; opacity: 0.8; height: 18px; }
.fade-out-text { animation: fadeOut 5s forwards; font-weight: bold; color: #4ade80; }

/* =========================================
   4. BUTTONS & INTERACTION
========================================= */
button {
    padding: 12px 22px; margin: 6px; font-size: 16px; cursor: pointer;

}

button:hover { background: #4b5563; transform: translateY(-2px); }

button:active {transform: scale(0.96);}

.answers { display: flex; flex-wrap: wrap; justify-content: center; gap: 14px; }
.answers button { flex: 1 1 200px; max-width: 320px; }

.fullscreenBtn { position: absolute; top: 12px; left: 12px; background: #374151; color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }

/* =========================================
   5. PROGRESS & MAZE TRACK
========================================= */
#progressBar { width: 100%; height: 22px; background: #2d3748; border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
#progressFill { height: 100%; width: 0%; background: linear-gradient(90deg, #f59e0b, #ef4444); transition: width 0.4s ease; }

#mazeTrack { display: grid; grid-template-columns: repeat(10, 36px); justify-content: center; gap: 10px; margin: 25px auto; }
.maze-box { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 20px; border-radius: 6px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }

.maze-box:nth-child(20) { text-shadow: 0 0 12px #a855f7; }
.maze-box:nth-child(30) { text-shadow: 0 0 15px #ef4444; }

/* =========================================

#artifactVault { margin-top: -6px; width: 220px; padding: 18px; border-radius: 12px; background: linear-gradient(180deg,#020617,#020617 60%,#020617 100%); box-shadow: 0 0 25px rgba(56,189,248,.15); border: 1px solid rgba(56,189,248,.25); text-align: center; display:block !important; }

.artifactSlot { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 70px; text-align:center; opacity: .25; transition: all .4s ease;}

/* Unlocked States */

.bossIcon { width: 96px; height: auto; display: block; margin: 0 auto 12px auto; animation: bossFloat 4s ease-in-out infinite; }
.tyrantGlow { filter: drop-shadow(0 0 14px rgba(96,165,250,.8)); }

.left-torch { left: 18px; }
.right-torch { right: 18px; transform: scaleX(-1); }

/* =========================================
   8. TRANSITIONS & SCREENS
========================================= */
#startScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('start screen image.png'); background-size: cover; background-position: center; background-repeat: no-repeat; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }

#hallwayTransition { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)), url('hallway1.png'); background-size: cover; background-position: center; display: flex; justify-content: center; align-items: center; text-align: center; color: white; font-size: 26px; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 1.2s ease; animation: hallwayZoom 3.2s ease-out forwards; }

@keyframes torchFlicker { 0%, 100% { filter: brightness(1); } 25% { filter: brightness(1.05); } 50% { filter: brightness(0.97); } 75% { filter: brightness(1.04); } }
@keyframes hitshake { 0% { transform: translateX(0); } 25% { transform: translateX(-8px); } 50% { transform: translateX(8px); } 75% { transform: translateX(-6px); } 100% { transform: translateX(0); } }
@keyframes bossShake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
@keyframes activePulse { 0% { box-shadow: 0 0 5px #60a5fa; transform: scale(1.1); } 100% { box-shadow: 0 0 20px #60a5fa; transform: scale(1.2); } }
@keyframes victoryGlow { 0%, 100% { transform: scale(1); text-shadow: 0 0 10px gold; } 50% { transform: scale(1.1); text-shadow: 0 0 25px gold, 0 0 40px orange; } }
@keyframes bossFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

.boss-mode #gameBox{

    margin:0 auto;

.boss-mode #gameShell{
    justify-content:center;
}
   
</style>
</head>

// =============================
// ADAPTIVE ENGINE

function weightedPick(pool){
    let weightedPool = [];
    pool.forEach(q => {
        let weight = 1;
        // Weakness boost
        if(q.tag && conceptMemory[q.tag]){
            weight += conceptMemory[q.tag];
        }
        // Coverage boost (if tag not seen recently)
        let recentCount = tagHistory.filter(t => t === q.tag).length;
        if(recentCount === 0){
            weight += 2;
        }
        for(let i = 0; i < weight; i++){
            weightedPool.push(q);
        }
    });
    return weightedPool[Math.floor(Math.random() * weightedPool.length)];
}

function getAdaptiveQuestion(poolName){
    let pool = questionBanks[poolName];
    let recent = questionHistory[poolName].slice(-5);
    let available = pool.filter(q => !recent.includes(q.id));
    if(available.length === 0){
        available = pool;
    }
    let picked = weightedPick(available);
    // Track history
    questionHistory[poolName].push(picked.id);
    if(questionHistory[poolName].length > 10){
        questionHistory[poolName].shift();
    }
    // Track tag exposure
    if(picked.tag){
        tagHistory.push(picked.tag);
        if(tagHistory.length > 10){
            tagHistory.shift();
        }
    }
    return picked;
}

function shuffleOptions(question){
    let q = {
        q: question.q,
        options: [...question.options],
        a: question.a,
        feedback: question.feedback,
        hint: question.hint,
        tag: question.tag,
        type: question.type
    };

    let correct = q.options[q.a];

    for(let i = q.options.length - 1; i > 0; i--){
        let j = Math.floor(Math.random() * (i + 1));
        [q.options[i], q.options[j]] = [q.options[j], q.options[i]];
    }

    q.a = q.options.indexOf(correct);

    return q;
}
    
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function getRiskMedium(){

// random probability (0.2 to 0.8)
let p = (Math.floor(Math.random()*7)+2)/10;

// random payoff ($50 to $200)
let payoff = (Math.floor(Math.random()*4)+1)*50;

// expected value
let ev = Math.round(p * payoff);

// distractors
let wrong1 = payoff;
let wrong2 = Math.round(payoff/2);
let wrong3 = 0;

// shuffle options
let options = [ev, wrong1, wrong2, wrong3];
let correct = ev;

shuffleArray(options);

return {
q:`A gamble pays $${payoff} with probability ${p} and $0 otherwise. What is the expected value?`,
options: options.map(o=>"$"+o),
a: options.indexOf(correct),
type:"calculation",
tag:"risk",
feedback:`Expected value = ${p} × ${payoff} = $${ev}.`
};

}

function getStrategicDominant(){

// --- Generate Player A payoffs (force dominance) ---
let base1 = Math.floor(Math.random()*5)+1;
let base2 = Math.floor(Math.random()*5)+1;

// A: Up always better than Down
let TL_A = base1 + 3;
let BL_A = base1;

let TR_A = base2 + 3;
let BR_A = base2;

// --- Generate Player B payoffs (random, irrelevant to A's dominance) ---
let TL_B = Math.floor(Math.random()*5)+1;
let TR_B = Math.floor(Math.random()*5)+1;
let BL_B = Math.floor(Math.random()*5)+1;
let BR_B = Math.floor(Math.random()*5)+1;

// --- Build clean matrix ---
let question = `Player A chooses between Up or Down. Player B chooses Left or Right.

Payoff matrix (A,B):

            B: Left        B: Right  
A: Up       (${TL_A},${TL_B})     (${TR_A},${TR_B})  
A: Down     (${BL_A},${BL_B})     (${BR_A},${BR_B})  

What is Player A’s dominant strategy?`;

let options = ["Up","Down","No dominant strategy","Depends on B"];
let correct = "Up";

shuffleArray(options);

return {
q: question,
options: options,
a: options.indexOf(correct),
tag:"game_theory",
feedback:"Compare Player A’s payoffs across each column. Up yields a higher payoff than Down regardless of Player B’s choice."
};

}

function getStrategicNash(){

// generate base payoffs
let a = Math.floor(Math.random()*4)+2;
let b = Math.floor(Math.random()*4)+1;

// build a Prisoner's Dilemma style structure
let matrix = {
TL:[a,a],        // cooperate
TR:[1,b+2],      // A cooperates, B defects
BL:[b+2,1],      // A defects, B cooperates
BR:[2,2]         // both defect (Nash)
};

let question = `Two players choose between Cooperate or Defect.

Payoff matrix (A,B):

                B: Coop        B: Defect  
A: Coop         (${matrix.TL})      (${matrix.TR})  
A: Defect       (${matrix.BL})      (${matrix.BR})  

What is the Nash equilibrium?`;

let options = [
"(Cooperate, Cooperate)",
"(Cooperate, Defect)",
"(Defect, Cooperate)",
"(Defect, Defect)"
];

let correct = "(Defect, Defect)";

shuffleArray(options);

return {
q: question,
options: options,
a: options.indexOf(correct),
tag:"game_theory",
feedback:"Both players defect because it is the best response to the other’s action. Neither can improve by deviating."
};

}

function getStrategicBestResponse(){

let upLeft = Math.floor(Math.random()*5)+1;
let downLeft = upLeft + Math.floor(Math.random()*3)+1;

let upRight = Math.floor(Math.random()*5)+1;
let downRight = upRight - Math.floor(Math.random()*2);

let question = `Player B chooses Left or Right. Player A must respond.

Payoffs to Player A:

            B: Left     B: Right  
A: Up       ${upLeft}          ${upRight}  
A: Down     ${downLeft}          ${downRight}  

If Player B chooses Left, what is Player A’s best response?`;

let options = ["Up","Down","Both are equal","Cannot determine"];
let correct = (downLeft > upLeft) ? "Down" : "Up";

shuffleArray(options);

return {
q: question,
options: options,
a: options.indexOf(correct),
tag:"game_theory",
feedback:"A best response is the action that gives the highest payoff given the opponent’s choice."
};

}

function getStrategicCooperation(){

// probability game continues (0.3 to 0.9)
let g = Math.round((Math.random()*0.6 + 0.3)*10)/10;

// cooperation payoff per round
let coop = Math.floor(Math.random()*3)+2;   // 2–4

// cheat payoff (temptation)
let cheat = coop + Math.floor(Math.random()*3)+1; // always higher

// punishment payoff after cheating
let punish = 1;

// present value style comparison (simplified intuition)
let cooperateValue = coop / (1 - g);
let cheatValue = cheat + (punish * (g/(1-g)));

// correct answer
let correct = (cooperateValue >= cheatValue) ? "Cooperate" : "Defect";

let question = `Two players are in a repeated game. Each round:

- If both cooperate, each earns ${coop}
- If one defects, they earn ${cheat} while the other gets 0
- After any defection, both players earn ${punish} forever

The probability the game continues each round is ${g}.

What is the best strategy?`;

let options = [
"Cooperate",
"Defect",
"Mix strategies",
"Depends only on current payoff"
];

shuffleArray(options);

return {
q: question,
options: options,
a: options.indexOf(correct),
tag:"game_theory",
feedback:`Cooperation value ≈ ${cooperateValue.toFixed(1)}, deviation value ≈ ${cheatValue.toFixed(1)}. If future payoffs matter enough, cooperation is sustained.`
};

}

function randomQuestion(poolName) {

    let pool = questionBanks[poolName];

        ...usedQuestions.finalBoss
    ];

    if (available.length === 0) {
        usedQuestions[poolName] = [];
        available = pool;
    }

    // Avoid three identical question types in a row
    let filtered = available;
    if (lastTypes.length >= 2) {
        let last1 = lastTypes[lastTypes.length - 1];
        let last2 = lastTypes[lastTypes.length - 2];

        if (last1 === last2) {
            filtered = available.filter(q => q.type !== last1);
            if (filtered.length === 0) filtered = available;
        }
    }

    let question = filtered[Math.floor(Math.random() * filtered.length)];

// Track types
lastTypes.push(question.type)
if(lastTypes.length > 3){
lastTypes.shift()
}

    return question;
}

function updateMazeTrack() {
    const track = document.getElementById("mazeTrack");
    track.innerHTML = ""; // Clear the old grid
    
    for (let i = 1; i <= 30; i++) {
        const box = document.createElement("div");
        box.setAttribute("role","img");
        box.setAttribute("aria-label",`Room ${i} of 30`);
        box.className = "maze-box";
        
        // Determine the icon and state
        if (i < room) {
            box.innerText = "🟩";
            box.style.opacity = "0.6";
        } else if (i === room) {
            box.classList.add("active"); // Trigger the gold pulse
            box.setAttribute("aria-label",`Current room ${i} of 30`);
            box.innerText = "🟦";
        } else {
            // Boss icons for future rooms
            if (i === 10) box.innerText = "🎲";
            else if (i === 20) box.innerText = "🛡️";
            else if (i === 30) box.innerText = "👑";
            else box.innerText = "⬛";
        }
        
        track.appendChild(box);
    }
}

function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

let calcBag = [];

function pickCalcGenerator(){

    if(calcBag.length === 0){
        calcBag = shuffle([...calculationGenerators]);
    }

    return calcBag.pop();
}

function pickRandom(pool){
    if(!pool._remaining || pool._remaining.length === 0){
        pool._remaining = shuffle([...pool]);
    }
    return pool._remaining.pop();
}

    }

// =============================
// QUESTION SELECTION
// =============================

if(adjustedDiff === "calculation"){

    currentQuestion = shuffleOptions(generator());
}
else{
    currentQuestion = shuffleOptions(
        getAdaptiveQuestion(adjustedDiff)
    );
}
        
// =============================
// --- WIZARD LOGIC ---
// =============================

    // 4. Update Hints and Draw Buttons

function displayQuestion() {

function answer(choice) {
    // --- GLOBAL MEMORY DECAY ---
    for(let tag in conceptMemory){
    conceptMemory[tag] *= 0.95;

        localStorage.setItem("gauntletRoom", room);

    }
        correctAnswers++;
        streak++;
        if (streak > maxStreak) maxStreak = streak;
        handleStreakVisuals();
    
        // --- LEARNING: reduce weakness ---
        if(currentQuestion.tag){
            conceptMemory[currentQuestion.tag] =
            (conceptMemory[currentQuestion.tag] || 0) * 0.7;
        }
        
       // --- BOSS HIT LOGIC ---
        if(isBossRoom){
        bossHealth--;
        sfxBossHit.currentTime = 0;
        sfxBossHit.play().catch(()=>{});

        msgElement.innerHTML = `<span style='color:#f87171;font-weight:bold;'>⚔ HIT! Boss Health: ${bossHealth}/3</span>`;

        triggerBossShake();

        if (bossHealth > 0) {
        setTimeout(loadQuestion, TIMING.boss);
        return;
        }

        // Boss defeated
        if(room === 10){
        document.getElementById("vaultDice").classList.add("unlocked");

        if(room === 20){
        document.getElementById("vaultShield").classList.add("unlocked");
        localStorage.setItem("vaultShield", "true");
        showArtifact(artifacts.shield.img, artifacts.shield.title, artifacts.shield.text);
        }

        if(room === 30){
        document.getElementById("vaultCore").classList.add("unlocked");
        localStorage.setItem("vaultCore", "true");
        showArtifact(artifacts.core.img, artifacts.core.title, artifacts.core.text);
        }

    showKnowledgeRoom(room);
    bossHealth = 3;
    return;
            }
        
msgElement.innerHTML = "";

room++;
localStorage.setItem("gauntletRoom", room);
showHallwayTransition(currentQuestion.feedback);
return;

    } else {
        if(isBossRoom){
        sfxWrong.volume = 0.7;
        } else {
        sfxWrong.volume = 0.5;
        }    
        sfxWrong.currentTime = 0;
        sfxWrong.play().catch(()=>{});
        wizardSpeak(getWizardFeedback("wrong"));
        wizard.style.transform = "translateX(-6px)";
        setTimeout(()=>{
            wizard.style.transform = "translateX(6px)";
            setTimeout(()=>{
                wizard.style.transform = "";
            },100);
        },100);
        streak = 0;

    if(currentQuestion.tag){
    conceptMemory[currentQuestion.tag] = (conceptMemory[currentQuestion.tag] || 0) + 1;
}

    // If question has a concept tag, trigger a reinforcement detour
    // --- Adaptive Concept Detour ---
   if(!detourActive &&currentQuestion.tag &&(conceptMemory[currentQuestion.tag] || 0) >= 2){

    let conceptPool = null;

    // Determine difficulty based on room
    if(room <= 9 && easyConceptPools[currentQuestion.tag]){
        conceptPool = easyConceptPools[currentQuestion.tag];
    }

    if(room >= 11 && room <= 19 && mediumConceptPools[currentQuestion.tag]){
        conceptPool = mediumConceptPools[currentQuestion.tag];
    }

       if(conceptPool){

        detourActive = true;
        detourReturnRoom = room;

        currentQuestion = shuffleOptions(pickRandom(conceptPool));

        document.getElementById("question").innerText = "Concept Check: " + currentQuestion.q;
        document.getElementById("formulaHint").innerText = currentQuestion.hint ? "💡 Hint: " + currentQuestion.hint : "";

        msgElement.innerHTML = `<span class='fade-out-text'>You falter… The labyrinth demands a concept check.</span>`;

        displayQuestion();
        return;
        }
       }

    // Normal failure handling
    document.getElementById("streakDisplay").innerText = "";
    bossHealth = 3;

    room = Math.max(1, room - (room % 10 === 0 ? 3 : (room >= 21 ? 2 : 1)));
    localStorage.setItem("gauntletRoom", room);

function shuffleArray(arr){
    for(let i=arr.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;

function updateHighScores(newTimeMs) {
    let scores = JSON.parse(localStorage.getItem("gauntletHighScores")) || [];
    scores.push({ name: username, time: newTimeMs, date: new Date().toLocaleDateString() });
    
    // Sort by time (lowest/fastest first) and keep top 5
    scores.sort((a, b) => a.time - b.time);
    scores = scores.slice(0, 5);
    
    localStorage.setItem("gauntletHighScores", JSON.stringify(scores));
    return scores;
}

function formatTime(ms) {
    let mins = Math.floor(ms / 60000);
    let secs = Math.floor((ms / 1000) % 60);
    return `${mins}m ${secs}s`;
}

function copyResults() {
    const totalTimeMs = Date.now() - startTime;
    const timeString = formatTime(totalTimeMs);
    const code = document.getElementById("vCode").innerText;
    const accuracy = Math.round((correctAnswers / totalAttempts) * 100);
        const shareText = `Adventurer: ${username}
        Time: ${timeString}
        Accuracy: ${accuracy}%
        Best Streak: ${maxStreak}
        Total Questions: ${totalAttempts}
        Code: ${code}
        Verified by The Archivist`;
    
    navigator.clipboard.writeText(shareText).then(() => {
        const btn = document.getElementById("shareBtn");
        const originalText = btn.innerText;
        btn.innerText = "✅ Copied to Clipboard!";
        btn.style.background = "#059669";
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = "#374151";
        }, 2000);
    });
}
